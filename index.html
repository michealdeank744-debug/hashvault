/* ═══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
function useLivePrices() {
  const [prices, setPrices]   = useState({ BTC:null, ETH:null, SOL:null, USDT:1 });
  const [changes, setChanges] = useState({ BTC:null, ETH:null, SOL:null, USDT:0 });
  const [lastUp, setLastUp]   = useState(null);
  const [loading, setLoading] = useState(false);
  const fetch24h = useCallback(async () => {
    setLoading(true);
    try {
      const r = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana,tether&vs_currencies=usd&include_24hr_change=true");
      const d = await r.json();
      setPrices({ BTC:d.bitcoin?.usd||null, ETH:d.ethereum?.usd||null, SOL:d.solana?.usd||null, USDT:d.tether?.usd||1 });
      setChanges({ BTC:d.bitcoin?.usd_24h_change||0, ETH:d.ethereum?.usd_24h_change||0, SOL:d.solana?.usd_24h_change||0, USDT:d.tether?.usd_24h_change||0 });
      setLastUp(new Date());
    } catch {}
    setLoading(false);
  },[]);
  useEffect(()=>{ fetch24h(); const t=setInterval(fetch24h,60000); return ()=>clearInterval(t); },[fetch24h]);
  return { prices, changes, lastUp, loading, refresh:fetch24h };
}

/* ── NOTIFICATION GENERATOR ── */
const getNotifications = (user, investments, transactions) => {
  const notes = [];
  const active = investments.filter(i=>i.status==="active");

  // Plans maturing soon
  active.forEach(inv=>{
    const d = dLeft(inv.endDate);
    const plan = PLANS.find(p=>p.id===inv.plan);
    if(d===0)  notes.push({id:"mat_"+inv.id, type:"success", icon:"🎉", title:"Plan Matured!", body:`Your ${plan?.name} Plan has matured. ${$(inv.totalReturn)} is ready.`});
    else if(d<=3) notes.push({id:"soon_"+inv.id, type:"warning", icon:"⏰", title:"Plan Maturing Soon", body:`Your ${plan?.name} Plan matures in ${d} day${d!==1?"s":""}. Check your returns.`});
  });

  // Binary interest due
  if((user.binaryBalance||0)>0 && user.binaryInterestLastPaid){
    const msElapsed = Date.now()-new Date(user.binaryInterestLastPaid).getTime();
    const daysElapsed = Math.floor(msElapsed/(24*60*60*1000));
    if(daysElapsed>=30) notes.push({id:"bin_int", type:"success", icon:"💰", title:"Binary Interest Due!", body:`Your binary account has earned ${$(user.binaryBalance*(BINARY_INTEREST/100))} in monthly interest.`});
  }

  // Referral bonus earned
  if((user.referralBonus||0)>0){
    const rank = getRank(user.referrals?.length||0);
    if(rank.id!=="member") notes.push({id:"rank_"+rank.id, type:"info", icon:rank.icon, title:`You're a ${rank.label}!`, body:`You've reached ${rank.label} status with ${user.referrals?.length} referrals. ${rank.bonusPct}% rank bonus applied.`});
  }

  // Pending withdrawal
  const pendingW = transactions.filter(t=>t.type==="withdrawal"&&t.status==="processing");
  if(pendingW.length>0) notes.push({id:"pending_w", type:"info", icon:"⏳", title:"Withdrawal Processing", body:`${pendingW.length} withdrawal${pendingW.length>1?"s are":" is"} being processed. Allow up to 3 business days.`});

  // Loyalty bonus available
  const loyaltyReady = investments.find(i=>i.loyaltyEligible&&!i.loyaltyClaimed&&dLeft(i.endDate)===0);
  if(loyaltyReady) notes.push({id:"loyalty", type:"success", icon:"⭐", title:"Loyalty Bonus Available!", body:`Your ${loyaltyReady.days===365?"12-month":"6-month"} plan has matured. Reinvest now to claim your ${loyaltyReady.days===365?LOYALTY_BONUS_12M:LOYALTY_BONUS_6M}% loyalty bonus.`});

  return notes;
};

      };
      const blob = new Blob([JSON.stringify(manifest)],{type:"application/json"});
      const url  = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel='manifest'; link.href=url;
      document.head.appendChild(link);

    /* 5. Service Worker — handles install + offline caching */
    if('serviceWorker' in navigator && !navigator.serviceWorker.controller){

        const CACHE = 'hashvault-v1';
        const ASSETS = [self.location.origin + self.location.pathname];

          self.skipWaiting();
        });
        self.addEventListener('activate', e => {
          e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
          self.clients.claim();
        });
        self.addEventListener('fetch', e => {
          if(e.request.method !== 'GET') return;
          e.respondWith(
            fetch(e.request).then(res => {
              const clone = res.clone();
              caches.open(CACHE).then(c => c.put(e.request, clone)).catch(()=>{});
              return res;
            }).catch(() => caches.match(e.request))
          );
        });

      @media(max-width:720px){
        .hv-hide-mobile{display:none!important;}
        .hv-stack{flex-direction:column!important;}
        .hv-full{width:100%!important;max-width:100%!important;}
        .hv-p-sm{padding:14px!important;}
        .hv-grid-1{grid-template-columns:1fr!important;}
        .hv-grid-2{grid-template-columns:1fr 1fr!important;}
        .hv-font-sm{font-size:clamp(11px,3.5vw,14px)!important;}
      }
    `;
    if(!document.getElementById('hv-global')) document.head.appendChild(style);

    /* 7. Capture install prompt */
    const onPrompt = (e) => { e.preventDefault(); setInstallPrompt(e); };
    window.addEventListener('beforeinstallprompt', onPrompt);

    /* 8. Detect if already installed */
    const onInstalled = () => { setInstalled(true); setInstallPrompt(null); };
    window.addEventListener('appinstalled', onInstalled);
    if(window.matchMedia('(display-mode: standalone)').matches) setInstalled(true);

    return () => {
      window.removeEventListener('beforeinstallprompt', onPrompt);
      window.removeEventListener('appinstalled', onInstalled);
    };
  },[]);

  const triggerInstall = async () => {
    if(!installPrompt) return;
    installPrompt.prompt();
    const { outcome } = await installPrompt.userChoice;
    if(outcome==='accepted') { setInstalled(true); setInstallPrompt(null); }
  };

  const [page, setPage]     = useState("landing");
  const [user, setUser]     = useState(null);
  const [authTab, setAuthTab] = useState("login");
  const [pendingRef, setPendingRef] = useState(""); // referral code from URL
  const [investments, setInv] = useState([]);
  const [transactions, setTxns] = useState([]);
  const [modal, setModal]   = useState(null);
  const [toast, setToast]   = useState(null);
  const [isDemo, setIsDemo] = useState(false);
  const [wallets, setWallets] = useState(DEFAULT_WALLETS);
  const [compoundRate, setCompoundRate] = useState(12);
  const [binaryPass, setBinaryPass]     = useState("");
  const [announcement, setAnnouncement] = useState(null); // admin banner
  const [geoStatus, setGeoStatus] = useState("checking");
  const priceData = useLivePrices();

  /* ── READ REFERRAL CODE FROM URL ── */
  useEffect(()=>{
    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");
    if(ref){ setPendingRef(ref.toUpperCase()); setAuthTab("register"); }
  },[]);

  /* ── US GEO BLOCK ── */
  useEffect(()=>{
    (async()=>{
      try {
        const r = await fetch("https://ipapi.co/json/");
        const d = await r.json();
        if(d.country_code === "US") setGeoStatus("blocked");
        else setGeoStatus("allowed");
      } catch {
        // If geo check fails, allow access (don't punish users on slow connections)
        setGeoStatus("allowed");
      }
    })();
  },[]);

  useEffect(()=>{ (async()=>{
    const w=await DB.get("wallets",true); if(w) setWallets(w);
    const cr=await DB.get("compound_rate",true); if(cr!==null) setCompoundRate(cr);
    const bp=await DB.get("binary_pass",true); if(bp) setBinaryPass(bp);
    const ann=await DB.get("announcement",true); if(ann) setAnnouncement(ann);
    // Silent background purge of inactive accounts
    setTimeout(purgeInactiveAccounts, 3000);
  })(); },[]);

  const showToast = useCallback((msg,type="ok")=>{ setToast({msg,type}); setTimeout(()=>setToast(null),3600); },[]);
  const loadData  = async (uid,demo=false)=>{ if(demo){ setInv(DEMO_INV); setTxns(DEMO_TXN); return; } setInv(await DB.get(`inv:${uid}`)||[]); setTxns(await DB.get(`txn:${uid}`)||[]); };
  const saveInv   = async (uid,data)=>{ setInv(data); if(!isDemo) await DB.set(`inv:${uid}`,data); };
  const saveTxn   = async (uid,data)=>{ setTxns(data); if(!isDemo) await DB.set(`txn:${uid}`,data); };

  /* ── PURGE INACTIVE ACCOUNTS ──
     Deletes users who registered 60+ days ago and have never made a deposit.
     Runs silently on login and on dashboard mount.                        */
  const purgeInactiveAccounts = async () => {
    try {
      const users = await DB.get("users")||{};
      const cutoff = INACTIVE_DELETE_DAYS * 24 * 60 * 60 * 1000;
      let changed = false;
      for(const email of Object.keys(users)){
        const u = users[email];
        if(u.isDemo) continue;
        const age = Date.now() - new Date(u.createdAt).getTime();
        if(age < cutoff) continue; // not old enough yet
        // Check if they ever made a deposit
        const invs = await DB.get(`inv:${u.id}`)||[];
        const hasDeposit = invs.some(i=>i.type!=="demo");
        const txns = await DB.get(`txn:${u.id}`)||[];
        const hasTx = txns.some(t=>t.type==="deposit");
        if(!hasDeposit && !hasTx){
          // Delete all their data
          delete users[email];
          try { await DB.delete(`inv:${u.id}`); } catch{}
          try { await DB.delete(`txn:${u.id}`); } catch{}
          changed = true;
        }
      }
      if(changed) await DB.set("users", users);
    } catch {}
  };

  const loginDemo = ()=>{ setUser(DEMO_USER); setIsDemo(true); loadData("DEMO001",true); setPage("dashboard"); };

  const handleLogin = async (email,password)=>{
    await purgeInactiveAccounts();
    const users=await DB.get("users")||{}, u=users[email];
    if(!u||u.password!==password) return "Invalid email or password";
    setUser(u); setIsDemo(false);
    const invs = await DB.get(`inv:${u.id}`)||[];
    const txns = await DB.get(`txn:${u.id}`)||[];
    // Auto-credit matured investments
    let updatedInvs = [...invs], updatedTxns = [...txns], creditTotal = 0, maturedCount = 0;
    let updatedUser = {...u};
    updatedInvs = updatedInvs.map(inv=>{
      if(inv.status==="active" && dLeft(inv.endDate)===0){
        creditTotal += inv.totalReturn;
        maturedCount++;
        updatedTxns.push({id:"TX"+uid(),type:"return",amount:inv.totalReturn,coin:inv.coin,status:"completed",date:now(),desc:`✅ ${inv.planName} Plan Matured — ${$(inv.totalReturn)} credited`});
        return {...inv, status:"completed", completedAt:now()};
      }
      return inv;
    });
    if(maturedCount>0){
      updatedUser = {...updatedUser, balance:(updatedUser.balance||0)+creditTotal};
      users[email] = updatedUser;
      await DB.set("users",users);
      await DB.set(`inv:${u.id}`, updatedInvs);
      await DB.set(`txn:${u.id}`, updatedTxns);
      setUser(updatedUser);
      setInv(updatedInvs); setTxns(updatedTxns);
      showToast(`🎉 ${maturedCount} plan${maturedCount>1?"s":""} matured! ${$(creditTotal)} credited to your balance.`,"ok");
    } else {
      await loadData(u.id);
    }
    setPage("dashboard"); return null;
  };

  const handleRegister = async (name,email,password,ref)=>{
    const users=await DB.get("users")||{};
    if(users[email]) return "Email already registered";
    const u={ id:uid(), name, email, password, balance:0, referralCode:rCode(), referredBy:ref||null, referrals:[], referralBonus:0, createdAt:now(), isDemo:false, onboardingDone:false };
    users[email]=u; await DB.set("users",users); setUser(u); setIsDemo(false); setInv([]); setTxns([]); setPage("dashboard");
    // Send welcome email (async, don't block)
    sendWelcomeEmail(email, name, u.referralCode);
    return null;
  };

  const handleLogout = ()=>{ setUser(null); setIsDemo(false); setPage("landing"); setInv([]); setTxns([]); };

  const handleDeposit = async (planId,durDays,amount,coin,compoundMode="none")=>{
    const plan=PLANS.find(p=>p.id===planId), dur=DURATIONS.find(d=>d.days===durDays);
    const totalReturn = calcReturn(amount, durDays, plan.dailyRoi, dur.bonusPct);
    const inv={ id:"INV"+uid(), plan:planId, planName:plan.name, amount, coin, days:durDays, startDate:now(), endDate:new Date(Date.now()+durDays*864e5).toISOString(), status:"active", dailyRoi:plan.dailyRoi, bonusPct:dur.bonusPct, totalReturn, compoundMode, isCompounded:false, loyaltyEligible: dur.loyaltyBonus||false, loyaltyBonusPct: dur.loyaltyBonusPct||0, loyaltyClaimed:false };
    const tx={ id:"TX"+uid(), type:"deposit", amount, coin, status:"completed", date:now(), desc:`${plan.name} Plan Investment${compoundMode!=="none"?" ("+( compoundMode==="auto"?"Auto-Compound":"Compound at Maturity")+")":""}` };
    await saveInv(user.id,[...investments,inv]);
    await saveTxn(user.id,[...transactions,tx]);
    if(user.referredBy&&!isDemo){
      const users=await DB.get("users")||{};
      const referrer=Object.values(users).find(u=>u.referralCode===user.referredBy);
      if(referrer&&!referrer.referrals.includes(user.id)){
        const refs=[...referrer.referrals, user.id];
        const prevRank = getRank(referrer.referrals.length);
        const newRank  = getRank(refs.length);
        const justPromoted = newRank.id !== prevRank.id;

        // Standard 3-referral bonus (10% of this deposit)
        const firstBonus = refs.length>=3 ? amount*0.10 : 0;

        // Rank bonus: on promotion, credit bonusPct% of ALL referrals' total invested
        let rankBonus = 0;
        let rankBonusTx = null;
        if(justPromoted && newRank.bonusPct > 0){
          // Sum up all existing referral deposits from DB
          let totalRefInvested = 0;
          for(const refId of refs){
            const refInvs = await DB.get(`inv:${refId}`) || [];
            totalRefInvested += refInvs.reduce((s,i)=>s+(i.amount||0),0);
          }
          // Add this new deposit too
          totalRefInvested += amount;
          rankBonus = totalRefInvested * (newRank.bonusPct/100);
          rankBonusTx = { id:"TX"+uid(), type:"rank_bonus", amount:rankBonus, coin:"USD", status:"completed", date:now(), desc:`🏆 ${newRank.label} Rank Bonus — ${newRank.bonusPct}% of $${Math.round(totalRefInvested).toLocaleString()} referral investments` };
        }

        const totalCredit = firstBonus + rankBonus;
        const updatedReferrer = {
          ...referrer,
          referrals:refs,
          referralBonus:(referrer.referralBonus||0)+firstBonus,
          rankBonus:(referrer.rankBonus||0)+rankBonus,
          balance:(referrer.balance||0)+totalCredit,
          rank:newRank.id,
        };
        users[referrer.email]=updatedReferrer;
        await DB.set("users",users);

        // Write transactions for referrer
        const rt = await DB.get(`txn:${referrer.id}`)||[];
        const newTxns = [...rt];
        if(firstBonus>0) newTxns.push({ id:"TX"+uid(), type:"referral", amount:firstBonus, coin:"USD", status:"completed", date:now(), desc:`Referral Bonus — ${refs.length} referrals` });
        if(rankBonusTx) newTxns.push(rankBonusTx);
        await DB.set(`txn:${referrer.id}`, newTxns);

        // Update current user's view if referrer is also current user (edge case)
        if(referrer.id===user.id){ setUser(updatedReferrer); }
      }
    }
    const pending=await DB.get("pending_deposits",true)||[];
    await DB.set("pending_deposits",[...pending,{id:inv.id,userId:user.id,userName:user.name,userEmail:user.email,amount,coin,plan:plan.name,date:now(),status:"pending_confirmation"}],true);
    setModal({type:"success",data:{inv,plan}});
  };

  const handleWithdraw = async (amount,coin,walletAddr)=>{
    if(isDemo){ showToast("Demo mode — withdrawal simulated ✓","ok"); setModal(null); return; }
    const tx={ id:"TX"+uid(), type:"withdrawal", amount, coin, status:"processing", date:now(), desc:`Withdrawal → ${walletAddr.slice(0,12)}… (3 business days)`, walletAddr };
    await saveTxn(user.id,[...transactions,tx]);
    const users=await DB.get("users")||{}, updated={...user,balance:(user.balance||0)-amount};
    users[user.email]=updated; await DB.set("users",users); setUser(updated);
    const queue=await DB.get("withdrawal_queue",true)||[];
    await DB.set("withdrawal_queue",[...queue,{id:tx.id,userId:user.id,userName:user.name,userEmail:user.email,amount,coin,walletAddr,date:now(),status:"pending",balance:user.balance,totalInvested:investments.filter(i=>i.status==="active").reduce((s,i)=>s+i.amount,0),activePlans:investments.filter(i=>i.status==="active").length,referrals:user.referrals?.length||0}],true);
    notifyAdmin({subject:"⚠ Withdrawal Request — HashVault",user_name:user.name,user_email:user.email,user_id:user.id,amount_req:`${amount} ${coin}`,wallet_addr:walletAddr,req_date:new Date().toLocaleString(),acct_balance:$(user.balance),total_inv:$(investments.filter(i=>i.status==="active").reduce((s,i)=>s+i.amount,0)),active_plans:investments.filter(i=>i.status==="active").length,referrals:user.referrals?.length||0});
    // Send confirmation email to user
    sendWithdrawalConfirmEmail(user.email, user.name, $(amount), coin, walletAddr);
    setModal(null); showToast("Withdrawal submitted — 3 business days ✓","ok");
  };

  /* ── COMPOUND an active package ── */
  const handleCompound = async (invId) => {
    if(isDemo){ showToast("Demo mode — compound simulated ✓","ok"); return; }
    const inv = investments.find(i=>i.id===invId);
    if(!inv) return;
    const plan = PLANS.find(p=>p.id===inv.plan);
    const newPrincipal = inv.totalReturn;
    // Compound uses admin compound rate as a daily rate
    const newTotalReturn = calcReturn(newPrincipal, inv.days, compoundRate, 0);
    const updatedInvs = investments.map(i=>i.id===invId ? {...i, status:"compounded", isCompounded:true, compoundedAt:now()} : i);
    const newInv = {
      id:"INV"+uid(), plan:inv.plan, planName:inv.planName, amount:newPrincipal,
      coin:inv.coin, days:inv.days, startDate:now(),
      endDate:new Date(Date.now()+inv.days*864e5).toISOString(),
      status:"active", dailyRoi:compoundRate, bonusPct:0, totalReturn:newTotalReturn,
      compoundMode:"none", isCompounded:false, compoundedFrom:invId,
    };
    const finalInvs = [...updatedInvs, newInv];
    const tx = { id:"TX"+uid(), type:"compound", amount:newPrincipal, coin:inv.coin, status:"completed", date:now(), desc:`Compounded ${plan?.name} Plan → ${$(newPrincipal)} reinvested @ ${compoundRate}%/day` };
    await saveInv(user.id, finalInvs);
    await saveTxn(user.id, [...transactions, tx]);
    showToast(`Compounded! ${$(newPrincipal)} reinvested at ${compoundRate}%/day ✓`,"ok");
  };

  /* ── COMPOUND at maturity (manual trigger at end of term) ── */
  const handleCompoundAtMaturity = async (invId) => {
    if(isDemo){ showToast("Demo mode — compound simulated ✓","ok"); return; }
    await handleCompound(invId);
  };

  /* ── LOYALTY REINVEST — 6-month (5%) and 12-month (10%) packages ── */
  const handleLoyaltyReinvest = async (invId) => {
    if(isDemo){ showToast("Demo mode — loyalty reinvest simulated ✓","ok"); return; }
    const inv = investments.find(i=>i.id===invId);
    if(!inv || !inv.loyaltyEligible || inv.loyaltyClaimed) return;

    const bonusPct     = inv.loyaltyBonusPct || (inv.days===365 ? LOYALTY_BONUS_12M : LOYALTY_BONUS_6M);
    const loyaltyBonus = inv.amount * (bonusPct / 100);
    const newPrincipal = inv.totalReturn;
    const dur          = DURATIONS.find(d=>d.days===inv.days);
    const newTotalReturn = calcReturn(newPrincipal, inv.days, DAILY_ROI, dur?.bonusPct||0);
    const durLabel     = inv.days===365 ? "12-Month" : "6-Month";

    const updatedInvs = investments.map(i => i.id===invId
      ? {...i, status:"completed", loyaltyClaimed:true, loyaltyReinvestedAt:now()}
      : i
    );

    const newInv = {
      id:"INV"+uid(), plan:inv.plan, planName:inv.planName,
      amount:newPrincipal, coin:inv.coin, days:inv.days,
      startDate:now(), endDate:new Date(Date.now()+inv.days*864e5).toISOString(),
      status:"active", dailyRoi:DAILY_ROI, bonusPct:dur?.bonusPct||0,
      totalReturn:newTotalReturn, compoundMode:"none", isCompounded:false,
      loyaltyEligible:true, loyaltyBonusPct:bonusPct, loyaltyClaimed:false,
      reinvestedFrom:invId,
    };

    const finalInvs = [...updatedInvs, newInv];
    const users = await DB.get("users")||{};
    const updated = {...user, balance:(user.balance||0)+loyaltyBonus};
    users[user.email] = updated;
    await DB.set("users", users);
    setUser(updated);

    const loyaltyTx = { id:"TX"+uid(), type:"loyalty", amount:loyaltyBonus, coin:"USD", status:"completed", date:now(), desc:`⭐ Loyalty Bonus — ${durLabel} Reinvestment (${bonusPct}% of ${$(inv.amount)})` };
    const reinvestTx = { id:"TX"+uid(), type:"deposit", amount:newPrincipal, coin:inv.coin, status:"completed", date:now(), desc:`${durLabel} Loyalty Reinvestment (${$(newPrincipal)})` };

    await saveInv(user.id, finalInvs);
    await saveTxn(user.id, [...transactions, loyaltyTx, reinvestTx]);
    showToast(`⭐ ${$(loyaltyBonus)} loyalty bonus credited (${bonusPct}%) + new ${durLabel} package started!`, "ok");
  };

  /* ── BINARY ACCOUNT: set user's own password (first time or change) ── */
  const handleBinarySetPassword = async (newPass) => {
    if(isDemo){ showToast("Demo mode — password set simulated ✓","ok"); return null; }
    if(!newPass||newPass.length<4) return "Password must be at least 4 characters";
    const users = await DB.get("users")||{};
    const updated = {...user, binaryPassword: newPass};
    users[user.email]=updated; await DB.set("users",users); setUser(updated);
    showToast("Binary account password set ✓","ok");
    return null;
  };

  /* ── BINARY ACCOUNT: bank from main balance ── */
  const handleBinaryDeposit = async (amount) => {
    if(isDemo){ showToast("Demo mode — binary deposit simulated ✓","ok"); return; }
    const users = await DB.get("users")||{};
    const isFirst = !(user.binaryBalance > 0) && !(user.binaryInterestStart);
    const updated = {
      ...user,
      balance:(user.balance||0)-amount,
      binaryBalance:(user.binaryBalance||0)+amount,
      // Set interest start on first deposit; keep existing date on top-ups
      binaryInterestStart: user.binaryInterestStart || now(),
      binaryInterestLastPaid: user.binaryInterestLastPaid || now(),
    };
    users[user.email]=updated; await DB.set("users",users); setUser(updated);
    const tx={id:"TX"+uid(),type:"binary_in",amount,coin:"USD",status:"completed",date:now(),desc:`🔒 Binary Account — ${$(amount)} banked`};
    await saveTxn(user.id,[...transactions,tx]);
    showToast(`${$(amount)} banked to Binary Account ✓`,"ok");
  };

  /* ── BINARY ACCOUNT: unlock back to main balance (user's own password) ── */
  const handleBinaryWithdraw = async (amount, enteredPass) => {
    if(isDemo){ showToast("Demo mode — binary release simulated ✓","ok"); return null; }
    const users = await DB.get("users")||{};
    const storedUser = users[user.email];
    if(!storedUser?.binaryPassword) return "You have not set a binary account password yet";
    if(enteredPass !== storedUser.binaryPassword) return "Incorrect binary account password";
    const updated = {...user, balance:(user.balance||0)+amount, binaryBalance:(user.binaryBalance||0)-amount};
    users[user.email]=updated; await DB.set("users",users); setUser(updated);
    const tx={id:"TX"+uid(),type:"binary_out",amount,coin:"USD",status:"completed",date:now(),desc:`🔓 Binary Account — ${$(amount)} released to main balance`};
    await saveTxn(user.id,[...transactions,tx]);
    showToast(`${$(amount)} released from Binary Account ✓`,"ok");
    return null;
  };

  /* ── BINARY INTEREST: called when Binary tab opens, credits 0.5%/month ── */
  const handleBinaryInterestCheck = async () => {
    if(isDemo || !(user.binaryBalance > 0) || !user.binaryInterestLastPaid) return;
    const lastPaid   = new Date(user.binaryInterestLastPaid);
    const msPerMonth = 30 * 24 * 60 * 60 * 1000;
    const monthsDue  = Math.floor((Date.now() - lastPaid.getTime()) / msPerMonth);
    if(monthsDue < 1) return; // nothing to credit yet

    let balance = user.binaryBalance;
    let totalInterest = 0;
    const newTxns = [...transactions];

    // Credit each month individually (compound on the growing balance)
    for(let m = 0; m < monthsDue; m++){
      const interest = balance * (BINARY_INTEREST / 100);
      balance += interest;
      totalInterest += interest;
      const creditDate = new Date(lastPaid.getTime() + (m+1) * msPerMonth).toISOString();
      newTxns.push({
        id:"TX"+uid(), type:"binary_interest", amount:interest, coin:"USD",
        status:"completed", date:creditDate,
        desc:`💰 Binary Interest — 0.5% monthly (Month ${m+1})`,
      });
    }

    const newLastPaid = new Date(lastPaid.getTime() + monthsDue * msPerMonth).toISOString();
    const users = await DB.get("users")||{};
    const updated = {
      ...user,
      binaryBalance: balance,
      binaryInterestLastPaid: newLastPaid,
      binaryInterestEarned: (user.binaryInterestEarned||0) + totalInterest,
    };
    users[user.email]=updated; await DB.set("users",users); setUser(updated);
    await saveTxn(user.id, newTxns);
    showToast(`💰 ${$(totalInterest)} binary interest credited for ${monthsDue} month${monthsDue>1?"s":""}!`,"ok");
  };

  // ── LOADING STATE ──
  if(geoStatus === "checking") return (
    <div style={{minHeight:"100vh",background:"#03070f",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Mono',monospace"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{textAlign:"center"}}>
        <div style={{width:36,height:36,border:"3px solid rgba(6,182,212,.2)",borderTop:"3px solid #06b6d4",borderRadius:"50%",animation:"spin 0.9s linear infinite",margin:"0 auto 20px"}}/>
        <div style={{fontSize:11,color:"#334155",letterSpacing:3}}>LOADING…</div>
      </div>
    </div>
  );

  if(geoStatus === "blocked") return <GeoBlocked/>;

  if(page==="terms")   return <Terms onBack={()=>setPage("landing")}/>;
  if(page==="privacy") return <Privacy onBack={()=>setPage("landing")}/>;
  if(page==="about")   return <About onBack={()=>setPage("landing")} onRegister={()=>{setAuthTab("register");setPage("auth");}}/>;
  if(page==="landing") return <Landing onLogin={()=>{setAuthTab("login");setPage("auth");}} onRegister={()=>{setAuthTab("register");setPage("auth");}} onDemo={loginDemo} onAbout={()=>setPage("about")} onTerms={()=>setPage("terms")} onPrivacy={()=>setPage("privacy")} priceData={priceData} installPrompt={installPrompt} installed={installed} onInstall={triggerInstall}/>;
  if(page==="auth")    return <Auth tab={authTab} setTab={setAuthTab} onLogin={handleLogin} onRegister={handleRegister} onBack={()=>setPage("landing")} pendingRef={pendingRef}/>;
  return <Dashboard user={user} investments={investments} transactions={transactions} modal={modal} setModal={setModal} toast={toast} showToast={showToast} onLogout={handleLogout} onDeposit={handleDeposit} onWithdraw={handleWithdraw} onCompound={handleCompound} onLoyaltyReinvest={handleLoyaltyReinvest} onBinaryDeposit={handleBinaryDeposit} onBinaryWithdraw={handleBinaryWithdraw} onBinarySetPassword={handleBinarySetPassword} onBinaryInterestCheck={handleBinaryInterestCheck} isDemo={isDemo} wallets={wallets} priceData={priceData} compoundRate={compoundRate} announcement={announcement} installPrompt={installPrompt} installed={installed} onInstall={triggerInstall}/>;
}

/* ═══════════════════════════════════════════════════════
   GEO BLOCK — US users
═══════════════════════════════════════════════════════ */
function GeoBlocked() {
  return (
    <div style={{minHeight:"100vh",background:"#03070f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Georgia',serif",textAlign:"center",position:"relative",overflow:"hidden"}}>

function TickerBar({ prices, changes, loading, refresh, lastUp }) {
  const coins=[["BTC","#f7931a"],["ETH","#627eea"],["SOL","#9945ff"],["USDT","#26a17b"]];
  return (
    <div style={{background:"rgba(0,0,0,.7)",borderBottom:"1px solid rgba(6,182,212,.1)",padding:"6px 20px",display:"flex",alignItems:"center",gap:0,overflowX:"auto",flexShrink:0}}>
      {coins.map(([sym,color])=>{
        const p=prices[sym], ch=changes[sym], up=(ch||0)>=0;
        return (
          <div key={sym} style={{display:"flex",alignItems:"center",gap:7,marginRight:28,flexShrink:0,fontFamily:"'DM Mono',monospace",fontSize:11}}>
            <span style={{width:7,height:7,borderRadius:"50%",background:color,boxShadow:`0 0 5px ${color}`,display:"inline-block"}}/>
            <span style={{color:"#94a3b8",fontWeight:600,letterSpacing:1}}>{sym}</span>
            <span style={{color:"#dde6f0",fontWeight:700}}>{p?`$${p.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`:"—"}</span>
            {ch!==null&&<span style={{color:up?"#10b981":"#f87171",fontSize:10}}>{up?"▲":"▼"}{Math.abs(ch||0).toFixed(2)}%</span>}
          </div>
        );
      })}
      <div style={{marginLeft:"auto",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
        {lastUp&&<span style={{fontSize:9,color:"#334155",fontFamily:"'DM Mono',monospace"}}>Updated {lastUp.toLocaleTimeString()}</span>}
        <button onClick={refresh} style={{background:"none",border:"none",color:"#334155",cursor:"pointer",fontSize:14}} title="Refresh">↻</button>
        {loading&&<span style={{fontSize:9,color:"#06b6d4",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>LIVE</span>}
      </div>
    </div>
  );
}

  const EVENTS = [

    { flag:"🇬🇭", loc:"Accra",       plan:"Silver",   amt:"$1,500" },

    { flag:"🇦🇪", loc:"Dubai",       plan:"Platinum", amt:"$50,000"},
    { flag:"🇸🇬", loc:"Singapore",   plan:"Gold",     amt:"$8,500" },
    { flag:"🇨🇦", loc:"Toronto",     plan:"Silver",   amt:"$2,300" },
    { flag:"🇬🇧", loc:"London",      plan:"Gold",     amt:"$6,100" },
    { flag:"🇮🇳", loc:"Mumbai",      plan:"Starter",  amt:"$400"   },
    { flag:"🇯🇵", loc:"Tokyo",       plan:"Silver",   amt:"$1,800" },
    { flag:"🇦🇺", loc:"Sydney",      plan:"Gold",     amt:"$9,200" },
    { flag:"🇩🇪", loc:"Berlin",      plan:"Silver",   amt:"$3,700" },
  ];
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  useEffect(()=>{
    const timer = setInterval(()=>{
      setVisible(false);
      setTimeout(()=>{ setIdx(i=>(i+1)%EVENTS.length); setVisible(true); },400);
    }, 3200);
    return ()=>clearInterval(timer);
  },[]);
  const e = EVENTS[idx];
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:8,padding:"7px 16px",background:"rgba(16,185,129,.07)",border:"1px solid rgba(16,185,129,.18)",borderRadius:20,marginBottom:24,fontFamily:"'DM Mono',monospace",fontSize:11,transition:"opacity .4s",opacity:visible?1:0}}>
      <span style={{fontSize:14}}>{e.flag}</span>
      <span style={{color:"#475569"}}>{e.loc}</span>
      <span style={{color:"#334155"}}>·</span>
      <span style={{color:"#10b981",fontWeight:600}}>{e.plan} Plan</span>
      <span style={{color:"#334155"}}>·</span>

      <span style={{width:6,height:6,borderRadius:"50%",background:"#10b981",display:"inline-block",animation:"pulse 1.5s infinite"}}/>
      <style>{`@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}`}</style>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════ */
function Auth({ tab, setTab, onLogin, onRegister, onBack, pendingRef="" }) {
  const [email,  setEmail]  = useState("");
  const [pass,   setPass]   = useState("");
  const [err,    setErr]    = useState("");
  const [loading,setLoad]   = useState(false);
  const [name,   setName]   = useState("");
  const [regPass,setRegPass]= useState("");
  const [ref,    setRef]    = useState(pendingRef||"");
  useEffect(()=>{ if(pendingRef) setRef(pendingRef); },[pendingRef]);
  const [regStep,   setRegStep]   = useState(1);
  const [otpCode,   setOtpCode]   = useState("");
  const [otpInput,  setOtpInput]  = useState("");
  const [otpErr,    setOtpErr]    = useState("");
  const [otpSentAt, setOtpSentAt] = useState(null);
  const [attempts,  setAttempts]  = useState(0);
  const [resendCD,  setResendCD]  = useState(0);
  const [emailJSok, setEmailJSok] = useState(false);
  const [devOTP,    setDevOTP]    = useState("");
  const [forgotStep,setForgotStep]= useState(0);
  const [fpEmail,setFpEmail]=useState(""), [fpName,setFpName]=useState(""),
        [fpNewPass,setFpNewPass]=useState(""), [fpConfirm,setFpConfirm]=useState(""),
        [fpErr,setFpErr]=useState("");
  const FP_STEPS=["","Enter Email","Verify Identity","New Password","Done"];

  useEffect(()=>{
    if(resendCD<=0) return;
    const t=setTimeout(()=>setResendCD(c=>c-1),1000);
    return ()=>clearTimeout(t);
  },[resendCD]);

  const submitLogin = async () => {
    setErr(""); setLoad(true);
    const e = await onLogin(email, pass);
    if(e) setErr(e);
    setLoad(false);
  };

  const submitDetails = async () => {
    setErr(""); setLoad(true);
    if(!name.trim()){ setErr("Full name is required"); setLoad(false); return; }
    if(!email.trim()||!email.includes("@")){ setErr("Valid email is required"); setLoad(false); return; }
    if(!regPass||regPass.length<6){ setErr("Password must be at least 6 characters"); setLoad(false); return; }
    const users = await DB.get("users")||{};
    if(users[email]){ setErr("Email already registered"); setLoad(false); return; }
    const otp = genOTP();
    setOtpCode(otp); setOtpSentAt(Date.now()); setAttempts(0); setOtpInput(""); setOtpErr("");
    const sent = await sendOTPEmail(email, name, otp);
    setEmailJSok(sent);
    if(!sent) setDevOTP(otp);
    setResendCD(60);
    setRegStep(2);
    setLoad(false);
  };

  const verifyOTP = async () => {
    setOtpErr(""); setLoad(true);
    if(Date.now()-otpSentAt > 10*60*1000){ setOtpErr("Code has expired. Please request a new one."); setLoad(false); return; }
    if(attempts>=5){ setOtpErr("Too many attempts. Please start over."); setLoad(false); return; }
    if(otpInput.trim() !== otpCode){
      setAttempts(a=>a+1);
      setOtpErr(`Incorrect code. ${4-attempts} attempt${4-attempts!==1?"s":""} remaining.`);
      setLoad(false); return;
    }
    const e = await onRegister(name, email, regPass, ref);
    if(e){ setOtpErr(e); setLoad(false); return; }
    setRegStep(3);
    setLoad(false);
  };

  const resendOTP = async () => {
    if(resendCD>0) return;
    const otp = genOTP();
    setOtpCode(otp); setOtpSentAt(Date.now()); setAttempts(0); setOtpInput(""); setOtpErr("");
    const sent = await sendOTPEmail(email, name, otp);
    setEmailJSok(sent);
    if(!sent) setDevOTP(otp);
    setResendCD(60);
  };

  const fpNext=async()=>{
    setFpErr("");
    if(forgotStep===1){
      if(!fpEmail){ setFpErr("Enter your email"); return; }
      const users=await DB.get("users")||{};
      if(!users[fpEmail]){ setFpErr("No account found with that email"); return; }
      setForgotStep(2);
    } else if(forgotStep===2){
      if(!fpName){ setFpErr("Enter your full name"); return; }
      const users=await DB.get("users")||{};
      const u=users[fpEmail];
      if(u.name.toLowerCase().trim()!==fpName.toLowerCase().trim()){ setFpErr("Name does not match our records"); return; }
      setForgotStep(3);
    } else if(forgotStep===3){
      if(!fpNewPass||fpNewPass.length<6){ setFpErr("Password must be at least 6 characters"); return; }
      if(fpNewPass!==fpConfirm){ setFpErr("Passwords do not match"); return; }
      const users=await DB.get("users")||{};
      users[fpEmail]={...users[fpEmail],password:fpNewPass};
      await DB.set("users",users);
      setForgotStep(4);
    }
  };
  const fpReset=()=>{ setForgotStep(0); setFpEmail(""); setFpName(""); setFpNewPass(""); setFpConfirm(""); setFpErr(""); };

  const IS={width:"100%",padding:"11px 13px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#dde6f0",fontSize:14,boxSizing:"border-box",outline:"none",fontFamily:"'DM Mono',monospace"};

  return (
    <div style={{minHeight:"100vh",background:"#03070f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap');@keyframes spin{to{transform:rotate(360deg)}}`}</style>
      <div style={{width:"100%",maxWidth:420}}>
        <button onClick={forgotStep>0?fpReset:onBack} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",marginBottom:24,fontFamily:"'DM Mono',monospace",fontSize:12}}>
          {forgotStep>0?"← Back to login":"← Back"}
        </button>
        <Logo/>

        {/* FORGOT PASSWORD */}
        {forgotStep>0?(
          <div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(245,158,11,.2)",borderRadius:16,padding:28,marginTop:22}}>
            <div style={{display:"flex",alignItems:"center",marginBottom:22,gap:0}}>
              {[1,2,3,4].map((s,i)=>(
                <div key={s} style={{display:"flex",alignItems:"center",flex:i<3?1:0}}>
                  <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,background:forgotStep>=s?"#f59e0b":"rgba(255,255,255,.06)",color:forgotStep>=s?"#fff":"#334155",border:`1px solid ${forgotStep>=s?"#f59e0b":"rgba(255,255,255,.1)"}`,flexShrink:0,fontFamily:"'DM Mono',monospace",transition:"all .3s"}}>{forgotStep>s?"✓":s}</div>
                  {i<3&&<div style={{flex:1,height:2,background:forgotStep>s?"#f59e0b":"rgba(255,255,255,.06)",margin:"0 6px",transition:"all .3s"}}/>}
                </div>
              ))}
            </div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,margin:"0 0 6px",color:"#dde6f0"}}>{forgotStep===4?"Password Reset!":FP_STEPS[forgotStep]}</h3>
            <p style={{fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 18px",lineHeight:1.7}}>
              {forgotStep===1&&"Enter the email address associated with your account."}
              {forgotStep===2&&"Enter your full name exactly as you registered it."}
              {forgotStep===3&&"Choose a new password for your account."}
              {forgotStep===4&&"Your password has been reset successfully. You can now log in."}
            </p>
            {forgotStep===1&&<Field label="EMAIL ADDRESS" value={fpEmail} onChange={setFpEmail} type="email" placeholder="you@example.com"/>}
            {forgotStep===2&&<Field label="FULL NAME" value={fpName} onChange={setFpName} placeholder="As registered"/>}
            {forgotStep===3&&(<div style={{display:"flex",flexDirection:"column",gap:12}}><Field label="NEW PASSWORD" value={fpNewPass} onChange={setFpNewPass} type="password" placeholder="Min 6 characters"/><Field label="CONFIRM PASSWORD" value={fpConfirm} onChange={setFpConfirm} type="password" placeholder="Repeat new password"/></div>)}
            {fpErr&&<div style={{marginTop:12,padding:"9px 13px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.28)",borderRadius:8,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{fpErr}</div>}
            {forgotStep<4
              ?<Btn variant="primary" onClick={fpNext} style={{width:"100%",marginTop:16,padding:"13px",fontSize:13,letterSpacing:1,background:"#f59e0b"}}>{forgotStep===3?"RESET PASSWORD":"CONTINUE →"}</Btn>
              :<Btn variant="primary" onClick={()=>{fpReset();setTab("login");}} style={{width:"100%",marginTop:16,padding:"13px",fontSize:13,letterSpacing:1}}>GO TO LOG IN →</Btn>}
          </div>

        /* LOGIN */
        ) : tab==="login" ? (
          <div style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(6,182,212,.14)",borderRadius:16,padding:28,marginTop:22}}>
            <div style={{display:"flex",background:"rgba(0,0,0,.4)",borderRadius:8,padding:4,marginBottom:24}}>
              {["login","register"].map(t=>(
                <button key={t} onClick={()=>{setTab(t);setErr("");setRegStep(1);}} style={{flex:1,padding:"9px 0",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontSize:11,background:tab===t?"#06b6d4":"transparent",color:tab===t?"#fff":"#475569",transition:"all .2s",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>{t==="login"?"LOG IN":"REGISTER"}</button>
              ))}
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:13}}>
              <Field label="Email" value={email} onChange={setEmail} placeholder="you@example.com" type="email"/>

            {err&&<div style={{marginTop:13,padding:"9px 13px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.28)",borderRadius:8,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{err}</div>}

          </div>

        /* REGISTER */
        ) : (

              {["login","register"].map(t=>(
                <button key={t} onClick={()=>{setTab(t);setErr("");setRegStep(1);}} style={{flex:1,padding:"9px 0",borderRadius:6,border:"none",cursor:"pointer",fontWeight:600,fontSize:11,background:tab===t?"#06b6d4":"transparent",color:tab===t?"#fff":"#475569",transition:"all .2s",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>{t==="login"?"LOG IN":"REGISTER"}</button>
              ))}
            </div>
            {/* Step progress */}
            <div style={{display:"flex",alignItems:"flex-start",marginBottom:20}}>
              {[["1","Details"],["2","Verify Email"],["3","Done"]].map(([n,l],i)=>(

                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,background:regStep>i+1?"#10b981":regStep===i+1?"#06b6d4":"rgba(255,255,255,.06)",color:regStep>=i+1?"#fff":"#334155",border:`1px solid ${regStep>i+1?"#10b981":regStep===i+1?"#06b6d4":"rgba(255,255,255,.1)"}`,transition:"all .3s",fontFamily:"'DM Mono',monospace"}}>{regStep>i+1?"✓":n}</div>
                    <span style={{fontSize:8,color:regStep===i+1?"#06b6d4":"#334155",fontFamily:"'DM Mono',monospace",letterSpacing:.5,whiteSpace:"nowrap"}}>{l.toUpperCase()}</span>
                  </div>
                  {i<2&&<div style={{flex:1,height:2,background:regStep>i+1?"#10b981":"rgba(255,255,255,.06)",margin:"0 8px 14px",transition:"all .3s"}}/>}
                </div>
              ))}
            </div>

            {/* STEP 1 */}
            {regStep===1&&(
              <div style={{display:"flex",flexDirection:"column",gap:13}}>
                <Field label="Full Name" value={name} onChange={setName} placeholder="Jane Smith"/>
                <Field label="Email Address" value={email} onChange={setEmail} placeholder="you@example.com" type="email"/>
                <Field label="Password (min 6 characters)" value={regPass} onChange={setRegPass} placeholder="••••••••" type="password"/>
                {pendingRef ? (
                  <div>
                    <label style={{display:"block",fontSize:9,color:"#475569",letterSpacing:2,marginBottom:6,fontFamily:"'DM Mono',monospace"}}>REFERRAL CODE</label>
                    <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 13px",background:"rgba(16,185,129,.07)",border:"1px solid rgba(16,185,129,.3)",borderRadius:8}}>
                      <span style={{fontSize:15}}>🎁</span>
                      <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:"#10b981",fontSize:14,letterSpacing:3,flex:1}}>{ref}</span>
                      <span style={{fontSize:10,color:"#10b981",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>✓ APPLIED</span>
                    </div>
                    <div style={{marginTop:5,fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace"}}>You were referred — your friend will earn a bonus when you invest.</div>
                  </div>
                ) : (
                  <Field label="Referral Code (optional)" value={ref} onChange={setRef} placeholder="REFXXXXX"/>
                )}
                {err&&<div style={{padding:"9px 13px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.28)",borderRadius:8,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{err}</div>}
                <Btn variant="primary" onClick={submitDetails} disabled={loading} style={{width:"100%",padding:"13px",fontSize:13,letterSpacing:1}}>{loading?"Sending Code…":"SEND VERIFICATION CODE →"}</Btn>
                <p style={{textAlign:"center",color:"#334155",fontSize:10,margin:0,fontFamily:"'DM Mono',monospace",lineHeight:1.7}}>By registering you agree to our <span style={{color:"#06b6d4",cursor:"pointer"}}>Terms</span> and <span style={{color:"#06b6d4",cursor:"pointer"}}>Privacy Policy</span></p>
                <p style={{textAlign:"center",color:"#334155",fontSize:11,margin:0,fontFamily:"'DM Mono',monospace"}}>Have an account? <span onClick={()=>{setTab("login");setErr("");}} style={{color:"#06b6d4",cursor:"pointer"}}>Log in</span></p>
              </div>
            )}

            {/* STEP 2 — OTP */}
            {regStep===2&&(
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                <div style={{textAlign:"center",padding:"4px 0 8px"}}>
                  <div style={{fontSize:38,marginBottom:8}}>📧</div>
                  <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#dde6f0",margin:"0 0 6px"}}>Verify Your Email</h3>
                  <p style={{fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace",margin:0,lineHeight:1.7}}>
                    {emailJSok ? <>Code sent to <strong style={{color:"#06b6d4"}}>{email}</strong></> : <>EmailJS not configured — see your code below:</>}
                  </p>
                </div>
                {!emailJSok&&devOTP&&(
                  <div style={{background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.3)",borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
                    <div style={{fontSize:9,color:"#92400e",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginBottom:6}}>DEV MODE — VERIFICATION CODE</div>
                    <div style={{fontFamily:"'DM Mono',monospace",fontWeight:700,fontSize:30,letterSpacing:10,color:"#fbbf24"}}>{devOTP}</div>
                    <div style={{fontSize:9,color:"#92400e",fontFamily:"'DM Mono',monospace",marginTop:5}}>Configure EmailJS to send this by email instead</div>
                  </div>
                )}
                <div>
                  <label style={{display:"block",fontSize:9,color:"#475569",letterSpacing:2,marginBottom:8,fontFamily:"'DM Mono',monospace",textAlign:"center"}}>ENTER 6-DIGIT CODE</label>
                  <input
                    value={otpInput} onChange={e=>setOtpInput(e.target.value.replace(/\D/g,"").slice(0,6))}
                    placeholder="000000" maxLength={6} inputMode="numeric" type="tel"
                    style={{...IS,textAlign:"center",fontSize:26,fontWeight:700,letterSpacing:10,padding:"14px 13px",border:`1px solid ${otpErr?"rgba(239,68,68,.5)":"rgba(6,182,212,.3)"}`,background:"rgba(6,182,212,.04)"}}
                    onKeyDown={e=>{ if(e.key==="Enter"){ if(otpInput.length===6) verifyOTP(); } }}
                  />
                </div>
                <div style={{textAlign:"center",fontSize:10,color:"#334155",fontFamily:"'DM Mono',monospace"}}>Expires in 10 minutes{attempts>0&&` · ${attempts} failed attempt${attempts!==1?"s":""}`}</div>
                {otpErr&&<div style={{padding:"9px 13px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.28)",borderRadius:8,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"center"}}>{otpErr}</div>}
                <Btn variant="primary" onClick={verifyOTP} disabled={loading||otpInput.length<6||attempts>=5} style={{width:"100%",padding:"13px",fontSize:13,letterSpacing:1}}>{loading?"Verifying…":"✓ VERIFY & CREATE ACCOUNT"}</Btn>
                <div style={{textAlign:"center"}}>
                  {resendCD>0
                    ?<span style={{fontSize:11,color:"#334155",fontFamily:"'DM Mono',monospace"}}>Resend in {resendCD}s</span>
                    :<span onClick={resendOTP} style={{fontSize:11,color:"#06b6d4",cursor:"pointer",fontFamily:"'DM Mono',monospace",textDecoration:"underline"}}>Resend code</span>}
                </div>
                <button onClick={()=>{setRegStep(1);setOtpInput("");setOtpErr("");}} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:11,fontFamily:"'DM Mono',monospace",textDecoration:"underline",textAlign:"center"}}>← Change email address</button>
              </div>
            )}

            {/* STEP 3 — Done */}
            {regStep===3&&(
              <div style={{textAlign:"center",padding:"16px 0 8px"}}>
                <div style={{fontSize:48,marginBottom:10}}>🎉</div>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:22,color:"#10b981",margin:"0 0 8px"}}>Account Verified!</h3>
                <p style={{fontSize:12,color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 18px",lineHeight:1.7}}>Welcome to HashVault, <strong style={{color:"#dde6f0"}}>{name}</strong>!<br/>Your email has been verified. Redirecting…</p>
                <div style={{width:32,height:32,border:"3px solid rgba(16,185,129,.2)",borderTop:"3px solid #10b981",borderRadius:"50%",animation:"spin 0.9s linear infinite",margin:"0 auto"}}/>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

              <div style={{fontSize:9,color:"#334155",letterSpacing:2,marginBottom:3,fontFamily:"'DM Mono',monospace"}}>BALANCE</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:17,color:"#06b6d4"}}>{$(user.balance)}</div>
            </div>
            {(user.binaryBalance||0)>0&&(
              <div style={{padding:"8px 12px",background:"rgba(251,191,36,.05)",border:"1px solid rgba(251,191,36,.15)",borderRadius:8,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11}}>🔒</span>
                <div>
                  <div style={{fontSize:9,color:"#334155",letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>BINARY</div>

                </div>
              </div>
            )}

      {/* ── BOTTOM NAV (mobile only) ── */}
      {(()=>{

                  <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:"#06b6d4"}}>{$(user.balance)}</div>

                    <div style={{fontSize:8,color:"#334155",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginBottom:2}}>BINARY</div>

/* ═══ TAB: OVERVIEW ═══ */
function TabOverview({ user, investments, transactions, totInv, totEarn, pending, setTab, priceData }) {
  const active=investments.filter(i=>i.status==="active");

  // Build portfolio chart data from transaction history (last 12 data points)
  const chartData = (() => {
    if(!transactions.length) return [];
    const sorted = [...transactions].sort((a,b)=>new Date(a.date)-new Date(b.date));
    let runningBalance = 0;
    const points = [];
    sorted.forEach(tx=>{
      if(tx.type==="deposit"||tx.type==="binary_in") runningBalance -= tx.amount;
      else if(["return","referral","rank_bonus","loyalty","binary_interest","compound"].includes(tx.type)) runningBalance += tx.amount;
      else if(tx.type==="withdrawal"||tx.type==="binary_out") runningBalance -= tx.amount;
      points.push({date:new Date(tx.date), value:runningBalance+user.balance});
    });
    // Sample max 10 points evenly
    if(points.length<=10) return points;
    const step = Math.floor(points.length/9);
    return points.filter((_,i)=>i%step===0||i===points.length-1).slice(-10);
  })();

  const chartMax = chartData.length ? Math.max(...chartData.map(p=>p.value), user.balance)*1.05 : user.balance*1.2||100;
  const chartMin = 0;
  const chartH = 80, chartW = 400;
  const toX = (i) => (i/(chartData.length-1||1))*chartW;
  const toY = (v) => chartH - ((v-chartMin)/(chartMax-chartMin||1))*chartH;
  const pathD = chartData.map((p,i)=>`${i===0?"M":"L"}${toX(i)},${toY(p.value)}`).join(" ");
  const areaD = chartData.length ? `${pathD} L${toX(chartData.length-1)},${chartH} L0,${chartH} Z` : "";

  return (
    <div>
      {/* ── INACTIVE ACCOUNT COUNTDOWN BANNER ── */}
      {(()=>{
        const hasDeposit = transactions.some(t=>t.type==="deposit");
        if(hasDeposit) return null;
        const ageMs   = Date.now() - new Date(user.createdAt).getTime();
        const ageDays = Math.floor(ageMs / (24*60*60*1000));
        const daysLeft= Math.max(0, INACTIVE_DELETE_DAYS - ageDays);
        const pct     = Math.min(100, (ageDays/INACTIVE_DELETE_DAYS)*100);
        const urgent  = daysLeft <= 7;
        const color   = daysLeft <= 7 ? "#ef4444" : daysLeft <= 14 ? "#f59e0b" : "#06b6d4";
        if(daysLeft === 0) return null; // already handled by purge
        return (
          <div style={{background:`${color}0d`,border:`1px solid ${color}40`,borderRadius:12,padding:"16px 20px",marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12,marginBottom:12}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:20}}>{urgent?"⚠️":"⏳"}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:14,color,fontFamily:"'Playfair Display',serif",marginBottom:2}}>
                    {urgent ? "Account Deletion Imminent" : "Account Verification Period"}
                  </div>
                  <div style={{fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace"}}>
                    {urgent
                      ? `Your account will be permanently deleted in ${daysLeft} day${daysLeft!==1?"s":""} if no deposit is made.`
                      : `Make your first deposit within ${daysLeft} day${daysLeft!==1?"s":""} to keep your account active.`}
                  </div>
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,color,lineHeight:1}}>{daysLeft}</div>
                <div style={{fontSize:9,color:"#334155",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>DAYS LEFT</div>
              </div>
            </div>
            {/* Progress bar */}
            <div style={{height:6,background:"rgba(255,255,255,.06)",borderRadius:3,marginBottom:8}}>
              <div style={{height:6,width:`${pct}%`,background:`linear-gradient(90deg,#06b6d4,${color})`,borderRadius:3,transition:"width .5s",boxShadow:`0 0 8px ${color}60`}}/>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#334155",fontFamily:"'DM Mono',monospace",marginBottom:12}}>
              <span>Day {ageDays} of {INACTIVE_DELETE_DAYS}</span>
              <span>{daysLeft} day{daysLeft!==1?"s":""} remaining</span>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <button onClick={()=>setTab("invest")} style={{padding:"9px 22px",background:color,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:1}}>
                ⬡ Make a Deposit Now
              </button>
              <span style={{fontSize:10,color:"#334155",fontFamily:"'DM Mono',monospace"}}>
                {urgent ? "⚠ Immediate action required to save your account" : "Accounts with no deposit are removed after 60 days"}
              </span>
            </div>
          </div>
        );
      })()}

      <OnboardingChecklist user={user} investments={investments} transactions={transactions} setTab={setTab}/>

      <EarningsCalendar investments={investments}/>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:13,marginBottom:20}}>
        {[[$(user.balance),"Account Balance","#06b6d4","◈"],[`${active.length} Package${active.length!==1?"s":""}  ·  ${$(totInv)}` ,"Active Packages","#10b981","⬡"],[$(totEarn+(user.referralBonus||0)),"Total Earned","#8b5cf6","★"],[$(pending),"Pending Withdrawal","#f59e0b","⏳"]].map(([v,l,c,i])=>(
          <div key={l} style={{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:12,padding:"17px 18px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}><span style={{fontSize:9,color:"#334155",letterSpacing:2,fontFamily:"'DM Mono',monospace"}}>{l.toUpperCase()}</span><span style={{color:c,fontSize:14}}>{i}</span></div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:700,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Portfolio Chart */}
      <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(6,182,212,.1)",borderRadius:14,padding:"18px 20px",marginBottom:18}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div>
            <div style={{fontSize:9,color:"#475569",letterSpacing:3,fontFamily:"'DM Mono',monospace",marginBottom:3}}>PORTFOLIO VALUE</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#06b6d4"}}>{$(user.balance)}</div>
          </div>
          {(user.binaryBalance||0)>0&&(
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:9,color:"#475569",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginBottom:3}}>INCL. BINARY</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#fbbf24"}}>{$(user.balance+(user.binaryBalance||0))}</div>
            </div>
          )}
        </div>
        {chartData.length>1?(
          <div style={{overflowX:"auto"}}>
            <svg viewBox={`0 0 ${chartW} ${chartH}`} style={{width:"100%",height:80,display:"block"}}>
              <defs>
                <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#06b6d4" stopOpacity="0.3"/>
                  <stop offset="100%" stopColor="#06b6d4" stopOpacity="0"/>
                </linearGradient>
              </defs>
              <path d={areaD} fill="url(#chartGrad)"/>
              <path d={pathD} fill="none" stroke="#06b6d4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              {chartData.map((p,i)=>(
                <circle key={i} cx={toX(i)} cy={toY(p.value)} r="3" fill="#06b6d4"/>
              ))}
            </svg>
            <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
              {chartData.filter((_,i)=>i===0||i===Math.floor(chartData.length/2)||i===chartData.length-1).map((p,i)=>(
                <div key={i} style={{fontSize:9,color:"#334155",fontFamily:"'DM Mono',monospace"}}>{p.date.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</div>
              ))}
            </div>
          </div>
        ):(
          <div style={{height:80,display:"flex",alignItems:"center",justifyContent:"center",color:"#1e293b",fontSize:11,fontFamily:"'DM Mono',monospace"}}>Chart will appear after your first transactions</div>
        )}
      </div>

      {active.length>0?(
        <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(255,255,255,.05)",borderRadius:12,padding:20,marginBottom:18}}>
          <h3 style={{margin:"0 0 16px",fontSize:9,color:"#475569",letterSpacing:3,fontFamily:"'DM Mono',monospace"}}>ACTIVE PLANS</h3>
          {active.map(inv=>{ const plan=PLANS.find(p=>p.id===inv.plan), pr=pct(inv); return(
            <div key={inv.id} style={{padding:"13px 0",borderBottom:"1px solid rgba(255,255,255,.04)"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:4}}>
                <div><span style={{fontWeight:600,color:plan?.color,fontFamily:"'Playfair Display',serif"}}>{plan?.name} Plan</span><span style={{marginLeft:10,fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{$(inv.amount)} · {inv.coin}</span></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"#10b981",fontFamily:"'DM Mono',monospace"}}>{dLeft(inv.endDate)}d left</div><div style={{fontSize:10,color:"#334155",fontFamily:"'DM Mono',monospace"}}>→ {$(inv.totalReturn)}</div></div>
              </div>
              <div style={{height:4,background:"rgba(255,255,255,.06)",borderRadius:2}}><div style={{height:4,width:`${pr}%`,background:plan?.color,borderRadius:2,boxShadow:`0 0 6px ${plan?.color}`}}/></div>
              <div style={{fontSize:9,color:"#334155",marginTop:4,fontFamily:"'DM Mono',monospace"}}>{pr}% COMPLETE</div>
            </div>
          );})}
        </div>
      ):(
        <div style={{background:"rgba(255,255,255,.015)",border:"1px dashed rgba(6,182,212,.18)",borderRadius:12,padding:44,textAlign:"center",marginBottom:18}}>
          <div style={{fontSize:34,marginBottom:12}}>⛏</div>
          <p style={{color:"#334155",marginBottom:18,fontFamily:"'DM Mono',monospace",fontSize:12}}>No active investments yet</p>
          <Btn variant="primary" onClick={()=>setTab("invest")} style={{padding:"10px 26px"}}>Start Investing</Btn>
        </div>
      )}
      {(()=>{ const rank=getRank(user.referrals?.length||0), next=getNextRank(user.referrals?.length||0), refs=user.referrals?.length||0, prog=next?Math.min(100,((refs-rank.min)/(next.min-rank.min))*100):100; return(
      <div style={{background:`linear-gradient(135deg,${rank.glow},rgba(0,0,0,.2))`,border:`1px solid ${rank.color}30`,borderRadius:12,padding:18}}>
