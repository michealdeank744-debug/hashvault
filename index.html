                <span>{inv.status==="completed"?"COMPLETED":inv.status==="compounded"?"COMPOUNDED":`${dLeft(inv.endDate)} DAYS LEFT`}</span>
              </div>
              {/* Daily earnings pill */}
              {inv.status==="active"&&(
                <div style={{display:"inline-flex",alignItems:"center",gap:6,padding:"5px 12px",background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.18)",borderRadius:6,marginBottom:10}}>
                  <span style={{fontSize:9,color:"#475569",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>DAILY EARNINGS</span>
                  <span style={{fontWeight:700,color:"#10b981",fontFamily:"'DM Mono',monospace",fontSize:13}}>{$(daily)}</span>
                </div>
              )}

              {/* ── LOYALTY BONUS BANNER — matured 12-month packages ── */}
              {inv.loyaltyEligible && !inv.loyaltyClaimed && isMatured && !isLoyaltyConfirming && !isConfirming && (
                <div style={{marginBottom:10,padding:"12px 16px",background:"linear-gradient(135deg,rgba(251,191,36,.08),rgba(245,158,11,.06))",border:"1px solid rgba(251,191,36,.35)",borderRadius:10,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                  <div>
                    <div style={{fontSize:11,color:"#fbbf24",fontFamily:"'DM Mono',monospace",fontWeight:700,letterSpacing:1,marginBottom:3}}>⭐ LOYALTY BONUS AVAILABLE</div>
                    <div style={{fontSize:10,color:"#92400e",fontFamily:"'DM Mono',monospace"}}>Reinvest your full return to claim a {invLoyaltyPct}% loyalty bonus</div>
                  </div>
                  <button onClick={()=>setLoyaltyConfirming(inv.id)} style={{padding:"8px 18px",background:"rgba(251,191,36,.15)",border:"1px solid rgba(251,191,36,.4)",borderRadius:7,color:"#fbbf24",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:1,flexShrink:0}}>
                    ⭐ Reinvest + Claim Bonus
                  </button>
                </div>
              )}

              {/* Loyalty bonus confirmation box */}
              {inv.loyaltyEligible && !inv.loyaltyClaimed && isLoyaltyConfirming && (
                <div style={{marginBottom:10,padding:"16px 18px",background:"rgba(251,191,36,.06)",border:"1px solid rgba(251,191,36,.3)",borderRadius:10}}>
                  <div style={{fontSize:10,color:"#fbbf24",fontFamily:"'DM Mono',monospace",fontWeight:700,letterSpacing:2,marginBottom:12}}>⭐ CONFIRM LOYALTY REINVESTMENT</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:14}}>
                    {[
                      ["Reinvest Amount", $(inv.totalReturn),                           "#06b6d4"],
                      ["Loyalty Bonus",   `+${$(loyaltyBonus)} (${invLoyaltyPct}%)`,    "#fbbf24"],
                      [`New ${durLabel} Return`, $(loyaltyNewReturn),                   "#10b981"],
                    ].map(([k,v,c])=>(
                      <div key={k} style={{textAlign:"center",padding:"10px 6px",background:"rgba(0,0,0,.3)",borderRadius:8}}>
                        <div style={{fontSize:9,color:"#475569",letterSpacing:1,fontFamily:"'DM Mono',monospace",marginBottom:4}}>{k}</div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:c}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:10,color:"#92400e",fontFamily:"'DM Mono',monospace",marginBottom:12,lineHeight:1.7}}>
                    Your total return of <strong style={{color:"#dde6f0"}}>{$(inv.totalReturn)}</strong> will be reinvested as a new {durLabel.toLowerCase()} package.<br/>
                    A loyalty bonus of <strong style={{color:"#fbbf24"}}>{$(loyaltyBonus)}</strong> ({invLoyaltyPct}% of your original <strong style={{color:"#dde6f0"}}>{$(inv.amount)}</strong> deposit) will be credited to your balance instantly.
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={async()=>{ await onLoyaltyReinvest(inv.id); setLoyaltyConfirming(null); }} style={{padding:"9px 22px",background:"#fbbf24",border:"none",borderRadius:7,color:"#000",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:1}}>
                      ⭐ Confirm & Claim Bonus
                    </button>
                    <button onClick={()=>setLoyaltyConfirming(null)} style={{padding:"9px 16px",background:"transparent",border:"1px solid rgba(255,255,255,.1)",borderRadius:7,color:"#475569",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>Cancel</button>
                  </div>
                </div>
              )}

              {/* Loyalty claimed badge */}
              {inv.loyaltyClaimed && (
                <div style={{marginBottom:10,display:"inline-flex",alignItems:"center",gap:6,padding:"4px 12px",background:"rgba(251,191,36,.08)",border:"1px solid rgba(251,191,36,.2)",borderRadius:6}}>
                  <span style={{fontSize:10,color:"#fbbf24",fontFamily:"'DM Mono',monospace"}}>⭐ Loyalty bonus claimed</span>
                </div>
              )}
              {/* Compound Now button */}
              {inv.status==="active"&&!isConfirming&&(
                <button onClick={()=>setConfirming(inv.id)} style={{padding:"8px 18px",background:"rgba(167,139,250,.1)",border:"1px solid rgba(167,139,250,.3)",borderRadius:7,color:"#a78bfa",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:600,letterSpacing:1}}>📈 Compound Now</button>
              )}
              {/* Confirmation box */}
              {inv.status==="active"&&isConfirming&&(
                <div style={{padding:"14px 16px",background:"rgba(167,139,250,.07)",border:"1px solid rgba(167,139,250,.22)",borderRadius:10}}>
                  <div style={{fontSize:10,color:"#a78bfa",fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:2,marginBottom:10}}>CONFIRM COMPOUND</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
                    {[["New Principal",$(inv.totalReturn),"#06b6d4"],["Rate",`${compoundRate}%/month`,"#a78bfa"],["Projected Return",$(compoundedReturn),"#10b981"]].map(([k,v,c])=>(
                      <div key={k} style={{textAlign:"center",padding:"8px 6px",background:"rgba(0,0,0,.3)",borderRadius:7}}>
                        <div style={{fontSize:9,color:"#475569",letterSpacing:1,fontFamily:"'DM Mono',monospace",marginBottom:3}}>{k}</div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:13,color:c}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",marginBottom:12,lineHeight:1.6}}>
                    Closes this package and opens a new one using <strong style={{color:"#dde6f0"}}>{$(inv.totalReturn)}</strong> as principal at <strong style={{color:"#a78bfa"}}>{compoundRate}%/month</strong> for {inv.days} days. Extra gain: <strong style={{color:"#10b981"}}>{$(gain)}</strong>.
                  </div>
                  <div style={{display:"flex",gap:10}}>
                    <button onClick={async()=>{ await onCompound(inv.id); setConfirming(null); }} style={{padding:"9px 20px",background:"#a78bfa",border:"none",borderRadius:7,color:"#fff",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:1}}>✓ Confirm</button>
                    <button onClick={()=>setConfirming(null)} style={{padding:"9px 16px",background:"transparent",border:"1px solid rgba(255,255,255,.1)",borderRadius:7,color:"#475569",cursor:"pointer",fontFamily:"'DM Mono',monospace",fontSize:11}}>Cancel</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══ TAB: WITHDRAW ═══ */
function TabWithdraw({ user, investments, transactions, onWithdraw, showToast, isDemo }) {
  const [step,      setStep]    = useState(1); // 1=amount+currency 2=wallet address 3=review
  const [amount,    setAmount]  = useState("");
  const [coin,      setCoin]    = useState("USDT");
  const [wallet,    setWallet]  = useState("");
  const [walletConf,setWalletC] = useState(""); // confirm address
  const [loading,   setLoad]    = useState(false);
  const [walletErr, setWalletE] = useState("");

  const totalBalance = user.balance || 0;
  const hasPending   = transactions.some(t=>t.type==="withdrawal"&&t.status==="processing");
  const activeLocked = investments.filter(i=>i.status==="active" && dLeft(i.endDate)>0);
  const lockedAmt    = activeLocked.reduce((s,i)=>s+i.amount, 0);
  const withdrawable = Math.max(0, totalBalance - lockedAmt);
  const hasLocked    = lockedAmt > 0;
  const amt          = parseFloat(amount)||0;

  const COIN_INFO = {
    USDT: { color:"#26a17b", hint:"TRC-20 or ERC-20 address (starts with T or 0x)", example:"TRx…  or  0x1a2b…" },
    ETH:  { color:"#627eea", hint:"Ethereum mainnet address (starts with 0x)", example:"0x1234abcd…" },
    SOL:  { color:"#9945ff", hint:"Solana mainnet address (32–44 characters)", example:"AbCdEf12…" },
  };

  const goToStep2 = () => {
    if(!amt||amt<=0)            { showToast("Enter a valid amount","error"); return; }
    if(amt > withdrawable)      { showToast(`Maximum withdrawable is ${$(withdrawable)}`,"error"); return; }
    if(hasPending)              { showToast("You have a pending withdrawal in progress","error"); return; }
    setWallet(""); setWalletC(""); setWalletE(""); setStep(2);
  };

  const goToStep3 = () => {
    setWalletE("");
    if(!wallet.trim())          { setWalletE("Please enter your wallet address"); return; }
    if(wallet.trim().length < 20){ setWalletE("That address looks too short — please double-check"); return; }
    if(wallet.trim() !== walletConf.trim()){ setWalletE("The two addresses you entered don't match. Please re-enter carefully."); return; }
    setStep(3);
  };

  const submit = async () => {
    setLoad(true);
    await onWithdraw(amt, coin, wallet.trim());
    setAmount(""); setWallet(""); setWalletC(""); setStep(1); setLoad(false);
  };

  const reset = () => { setStep(1); setAmount(""); setWallet(""); setWalletC(""); setWalletE(""); };

  const ci = COIN_INFO[coin];

  return (
    <div style={{maxWidth:520}}>

      {/* Balance cards */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <div style={{background:"rgba(6,182,212,.05)",border:"1px solid rgba(6,182,212,.18)",borderRadius:12,padding:"16px 18px"}}>
          <div style={{fontSize:9,color:"#334155",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginBottom:5}}>WITHDRAWABLE NOW</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:"#06b6d4"}}>{$(withdrawable)}</div>
          <div style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",marginTop:3}}>From matured returns &amp; bonuses</div>
        </div>
        <div style={{background:"rgba(245,158,11,.04)",border:"1px solid rgba(245,158,11,.18)",borderRadius:12,padding:"16px 18px"}}>
          <div style={{fontSize:9,color:"#334155",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginBottom:5}}>LOCKED IN PACKAGES</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,color:"#f59e0b"}}>{$(lockedAmt)}</div>
          <div style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",marginTop:3}}>Available at maturity</div>
        </div>
      </div>

      {hasPending&&(
        <div style={{padding:"11px 15px",background:"rgba(251,191,36,.06)",border:"1px solid rgba(251,191,36,.2)",borderRadius:10,marginBottom:14,fontSize:11,color:"#fbbf24",fontFamily:"'DM Mono',monospace"}}>
          ⏳ You have a pending withdrawal — wait for it to be processed (3 business days) before submitting another.
        </div>
      )}

      {hasLocked&&(
        <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(255,255,255,.05)",borderRadius:12,padding:"14px 18px",marginBottom:16}}>
          <div style={{fontSize:9,color:"#475569",letterSpacing:2,fontFamily:"'DM Mono',monospace",marginBottom:12}}>🔒 LOCKED IN ACTIVE PACKAGES</div>
          {activeLocked.map(inv=>{ const plan=PLANS.find(p=>p.id===inv.plan); return(
            <div key={inv.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",background:"rgba(245,158,11,.04)",border:`1px solid ${plan?.color}20`,borderRadius:8,marginBottom:6}}>
              <div>
                <div style={{fontWeight:600,color:plan?.color,fontFamily:"'Playfair Display',serif",fontSize:13}}>{plan?.name} Plan</div>
                <div style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",marginTop:2}}>Matures in <strong style={{color:"#fbbf24"}}>{dLeft(inv.endDate)}d</strong> · {fmtDate(inv.endDate)}</div>
              </div>
              <div style={{textAlign:"right",fontFamily:"'DM Mono',monospace"}}>
                <div style={{fontWeight:700,color:"#f59e0b"}}>{$(inv.amount)}</div>
                <div style={{fontSize:10,color:"#475569"}}>→ {$(inv.totalReturn)}</div>
              </div>
            </div>
          );})}
        </div>
      )}

      {withdrawable > 0 ? (
        <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(255,255,255,.06)",borderRadius:14,overflow:"hidden"}}>

          {/* Step progress header */}
          <div style={{padding:"14px 20px",borderBottom:"1px solid rgba(255,255,255,.06)",background:"rgba(0,0,0,.2)"}}>
            <div style={{display:"flex",alignItems:"center",gap:0}}>
              {[["1","Amount"],["2","Wallet"],["3","Confirm"]].map(([n,l],i)=>(
                <div key={n} style={{display:"flex",alignItems:"center",flex:i<2?1:0}}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                    <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,
                      background:step>i+1?"#10b981":step===i+1?"#06b6d4":"rgba(255,255,255,.06)",
                      color:step>=i+1?"#fff":"#334155",
                      border:`1px solid ${step>i+1?"#10b981":step===i+1?"#06b6d4":"rgba(255,255,255,.1)"}`,
                      fontFamily:"'DM Mono',monospace",transition:"all .3s"}}>
                      {step>i+1?"✓":n}
                    </div>
                    <span style={{fontSize:8,color:step===i+1?"#06b6d4":"#334155",fontFamily:"'DM Mono',monospace",letterSpacing:.5}}>{l.toUpperCase()}</span>
                  </div>
                  {i<2&&<div style={{flex:1,height:2,background:step>i+1?"#10b981":"rgba(255,255,255,.06)",margin:"0 10px 14px",transition:"all .3s"}}/>}
                </div>
              ))}
            </div>
          </div>

          <div style={{padding:22,display:"flex",flexDirection:"column",gap:16}}>

            {/* ── STEP 1: Amount & Currency ── */}
            {step===1&&(<>
              <div>
                <label style={{fontSize:9,color:"#475569",letterSpacing:2,display:"block",marginBottom:8,fontFamily:"'DM Mono',monospace"}}>SELECT CURRENCY</label>
                <div style={{display:"flex",gap:8}}>
                  {[["USDT","#26a17b","TRC-20 / ERC-20"],["ETH","#627eea","Ethereum"],["SOL","#9945ff","Solana"]].map(([c,col,net])=>(
                    <button key={c} onClick={()=>setCoin(c)} style={{flex:1,padding:"12px 6px",borderRadius:10,border:`2px solid ${coin===c?col:"rgba(255,255,255,.08)"}`,background:coin===c?`${col}15`:"transparent",cursor:"pointer",transition:"all .2s",textAlign:"center"}}>
                      <div style={{fontWeight:700,color:coin===c?col:"#475569",fontFamily:"'DM Mono',monospace",fontSize:13,marginBottom:3}}>{c}</div>
                      <div style={{fontSize:9,color:"#334155",fontFamily:"'DM Mono',monospace"}}>{net}</div>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <Field label={`AMOUNT TO WITHDRAW (USD) — MAX ${$(withdrawable)}`} value={amount} onChange={setAmount} type="number" placeholder={`Up to ${$(withdrawable)}`}/>
                {amt>0&&amt<=withdrawable&&(
                  <div style={{marginTop:8,padding:"9px 13px",background:"rgba(6,182,212,.05)",border:"1px solid rgba(6,182,212,.12)",borderRadius:8,fontSize:11,fontFamily:"'DM Mono',monospace",color:"#475569"}}>
                    Withdrawing <strong style={{color:"#06b6d4"}}>{$(amt)}</strong> via <strong style={{color:ci.color}}>{coin}</strong> · Remaining balance: <strong style={{color:"#dde6f0"}}>{$(withdrawable-amt)}</strong>
                  </div>
                )}
              </div>
              <Btn variant="primary" onClick={goToStep2} disabled={hasPending||!amt||amt<=0} style={{padding:"13px",letterSpacing:1,opacity:hasPending?.4:1}}>
                {hasPending?"PENDING WITHDRAWAL":"NEXT — ENTER WALLET ADDRESS →"}
              </Btn>
            </>)}

            {/* ── STEP 2: Wallet Address ── */}
            {step===2&&(<>
              {/* Coin reminder */}
              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:`${ci.color}10`,border:`1px solid ${ci.color}25`,borderRadius:9}}>
                <span style={{width:10,height:10,borderRadius:"50%",background:ci.color,display:"inline-block",flexShrink:0}}/>
                <div>
                  <div style={{fontWeight:700,color:ci.color,fontFamily:"'DM Mono',monospace",fontSize:13}}>{coin} — {$(amt)}</div>
                  <div style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{ci.hint}</div>
                </div>
              </div>

              {/* Address entry */}
              <div>
                <label style={{fontSize:9,color:"#475569",letterSpacing:2,display:"block",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>YOUR {coin} RECEIVING ADDRESS</label>
                <textarea
                  value={wallet} onChange={e=>setWallet(e.target.value.trim())} rows={2}
                  placeholder={`Paste your ${coin} wallet address here\ne.g. ${ci.example}`}
                  style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,.03)",border:`2px solid ${wallet.length>10?ci.color:"rgba(255,255,255,.12)"}`,borderRadius:10,color:"#dde6f0",fontSize:13,fontFamily:"'DM Mono',monospace",outline:"none",resize:"none",boxSizing:"border-box",lineHeight:1.6,transition:"border-color .2s",letterSpacing:.5}}
                />
                {wallet.length>0&&<div style={{marginTop:4,fontSize:9,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{wallet.length} characters</div>}
              </div>

              {/* Confirm address */}
              <div>
                <label style={{fontSize:9,color:"#ef4444",letterSpacing:2,display:"block",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>⚠ CONFIRM ADDRESS — RE-ENTER EXACTLY</label>
                <textarea
                  value={walletConf} onChange={e=>setWalletC(e.target.value.trim())} rows={2}
                  placeholder={`Re-enter your ${coin} address to confirm`}
                  style={{width:"100%",padding:"12px 14px",background:"rgba(255,255,255,.03)",border:`2px solid ${walletConf.length>10&&walletConf===wallet?"#10b981":walletConf.length>10&&walletConf!==wallet?"#ef4444":"rgba(255,255,255,.12)"}`,borderRadius:10,color:"#dde6f0",fontSize:13,fontFamily:"'DM Mono',monospace",outline:"none",resize:"none",boxSizing:"border-box",lineHeight:1.6,transition:"border-color .2s",letterSpacing:.5}}
                />
                {walletConf.length>10&&(
                  <div style={{marginTop:4,fontSize:10,fontFamily:"'DM Mono',monospace",color:walletConf===wallet?"#10b981":"#ef4444"}}>
                    {walletConf===wallet?"✓ Addresses match":"✗ Addresses don't match yet"}
                  </div>
                )}
              </div>

              {walletErr&&<div style={{padding:"10px 13px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.28)",borderRadius:8,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>{walletErr}</div>}

              <div style={{padding:"10px 13px",background:"rgba(245,158,11,.05)",border:"1px solid rgba(245,158,11,.17)",borderRadius:8,fontSize:11,color:"#92400e",fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>
                ⚠ Double-check your address. Crypto transactions are irreversible — funds sent to a wrong address cannot be recovered.
              </div>

              <div style={{display:"flex",gap:10}}>
                <Btn variant="outline" onClick={()=>setStep(1)} style={{padding:"12px 18px"}}>← Back</Btn>
                <Btn variant="primary" onClick={goToStep3} style={{flex:1,padding:"13px",letterSpacing:1}}>REVIEW WITHDRAWAL →</Btn>
              </div>
            </>)}

            {/* ── STEP 3: Review & Confirm ── */}
            {step===3&&(<>
              <div style={{textAlign:"center",paddingBottom:4}}>
                <div style={{fontSize:32,marginBottom:6}}>📋</div>
                <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,color:"#dde6f0",margin:"0 0 4px"}}>Review Your Withdrawal</h3>
                <p style={{fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace",margin:0}}>Please verify all details before confirming</p>
              </div>

              <div style={{background:"rgba(0,0,0,.3)",border:"1px solid rgba(255,255,255,.08)",borderRadius:12,overflow:"hidden"}}>
                {[
                  ["Amount",  $(amt),    "#06b6d4"],
                  ["Currency",coin,      ci.color ],
                  ["Network", coin==="USDT"?"TRC-20 / ERC-20":coin==="ETH"?"Ethereum Mainnet":"Solana Mainnet", "#94a3b8"],
                  ["Processing","Up to 3 business days","#f59e0b"],
                ].map(([k,v,c])=>(
                  <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 16px",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
                    <span style={{fontSize:10,color:"#475569",fontFamily:"'DM Mono',monospace",letterSpacing:1}}>{k.toUpperCase()}</span>
                    <span style={{fontWeight:700,color:c,fontFamily:"'DM Mono',monospace",fontSize:13}}>{v}</span>
                  </div>
                ))}
                {/* Wallet address — full display */}
                <div style={{padding:"13px 16px"}}>
                  <div style={{fontSize:9,color:"#475569",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:8}}>SENDING TO WALLET</div>
                  <div style={{background:`${ci.color}0d`,border:`1px solid ${ci.color}25`,borderRadius:8,padding:"10px 13px",fontFamily:"'DM Mono',monospace",fontSize:12,color:ci.color,wordBreak:"break-all",lineHeight:1.7}}>{wallet}</div>
                </div>
              </div>

              <div style={{padding:"10px 13px",background:"rgba(239,68,68,.07)",border:"1px solid rgba(239,68,68,.2)",borderRadius:8,fontSize:11,color:"#f87171",fontFamily:"'DM Mono',monospace",lineHeight:1.6}}>
                🔴 This action is <strong>irreversible</strong>. Funds sent to an incorrect address cannot be recovered. Confirm only if the wallet address above is correct.
              </div>

              <div style={{display:"flex",gap:10}}>
                <Btn variant="outline" onClick={()=>setStep(2)} style={{padding:"12px 18px"}}>← Edit Address</Btn>
                <Btn variant="primary" onClick={submit} disabled={loading} style={{flex:1,padding:"13px",letterSpacing:1,background:"#10b981"}}>
                  {loading?"SUBMITTING…":"✓ CONFIRM & WITHDRAW"}
                </Btn>
              </div>
            </>)}

          </div>

  const [passVisible, setPassVisible] = useState(false);
  const [loading,     setLoading]     = useState(false);
  const [err,         setErr]         = useState("");
  const [newPass,     setNewPass]     = useState("");
  const [confirmPass, setConfirmPass] = useState("");
  const [currentPass, setCurrentPass] = useState("");

  const [newVisible,  setNewVisible]  = useState(false);

  useEffect(()=>{ onBinaryInterestCheck && onBinaryInterestCheck(); },[]);

  const hasPassword = !!user.binaryPassword;
  const balance     = user.balance || 0;
  const binaryBal   = user.binaryBalance || 0;
  const binaryTxns  = transactions.filter(t=>["binary_in","binary_out","binary_interest"].includes(t.type));
  const msPerMonth  = 30*24*60*60*1000;
  const lastPaid    = user.binaryInterestLastPaid ? new Date(user.binaryInterestLastPaid) : null;
  const msElapsed   = lastPaid ? Date.now()-lastPaid.getTime() : 0;
  const daysElapsed = Math.floor(msElapsed/(24*60*60*1000));
  const daysToNext  = lastPaid ? Math.max(0,30-daysElapsed) : null;
  const nextPayment = binaryBal*(BINARY_INTEREST/100);
  const totalEarned = user.binaryInterestEarned||0;

  const resetForms = () => { setNewPass(""); setConfirmPass(""); setCurrentPass(""); setUnlockPass(""); setPassErr(""); setErr(""); setDepositAmt(""); setWithdrawAmt(""); setPassVisible(false); setNewVisible(false); };

  const submitSetPass = async () => {
    setPassErr("");
    if(!newPass||newPass.length<4){ setPassErr("Password must be at least 4 characters"); return; }
    if(newPass!==confirmPass){ setPassErr("Passwords do not match"); return; }
    if(hasPassword&&currentPass!==user.binaryPassword){ setPassErr("Current password is incorrect"); return; }
    setLoading(true);
    const e = await onBinarySetPassword(newPass);
    if(e){ setPassErr(e); setLoading(false); return; }
    resetForms(); setView("main"); setLoading(false);
    showToast("Binary account password set successfully ✓","ok");
  };

  const handleDeposit = async () => {
    const amt = parseFloat(depositAmt);

    if(amt>balance){ showToast("Insufficient main balance","error"); return; }
    setLoading(true); await onBinaryDeposit(amt);
    resetForms(); setView("main"); setLoading(false);

  const handleRelease = async () => {
    const amt = parseFloat(withdrawAmt);

    if(amt>binaryBal){ setErr("Insufficient binary balance"); return; }
    if(!unlockPass.trim()){ setErr("Enter your binary account password"); return; }

            </div>

/* ═══ EARNINGS CALENDAR (used in TabOverview) ═══ */
function EarningsCalendar({ investments }) {
  const today = new Date();
  const year  = today.getFullYear();
  const month = today.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = today.toLocaleDateString("en-US",{month:"long",year:"numeric"});

  // Map maturity dates to day numbers
  const maturities = {};
  investments.filter(i=>i.status==="active").forEach(inv=>{
    const d = new Date(inv.endDate);
    if(d.getFullYear()===year && d.getMonth()===month){
      const day = d.getDate();
      if(!maturities[day]) maturities[day]=[];
      const plan = PLANS.find(p=>p.id===inv.plan);
      maturities[day].push({color:plan?.color||"#06b6d4", amount:inv.totalReturn, name:plan?.name||inv.planName});
    }
  });

  const cells = [];
  for(let i=0;i<firstDay;i++) cells.push(null);
  for(let d=1;d<=daysInMonth;d++) cells.push(d);

  return (
    <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(255,255,255,.05)",borderRadius:14,padding:"18px 20px",marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div>
          <div style={{fontSize:9,color:"#475569",letterSpacing:3,fontFamily:"'DM Mono',monospace",marginBottom:3}}>MATURITY CALENDAR</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:16,fontWeight:700,color:"#dde6f0"}}>{monthName}</div>
        </div>
        {Object.keys(maturities).length>0&&(
          <div style={{fontSize:11,color:"#10b981",fontFamily:"'DM Mono',monospace"}}>{Object.keys(maturities).length} maturity date{Object.keys(maturities).length!==1?"s":""} this month</div>
        )}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:8}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=>(
          <div key={d} style={{textAlign:"center",fontSize:9,color:"#334155",fontFamily:"'DM Mono',monospace",padding:"3px 0"}}>{d}</div>
        ))}
        {cells.map((d,i)=>{
          const isToday = d===today.getDate();
          const hasMat = d && maturities[d];
          return (
            <div key={i} style={{position:"relative",aspectRatio:"1",borderRadius:6,background:isToday?"rgba(6,182,212,.15)":hasMat?"rgba(16,185,129,.1)":"rgba(255,255,255,.02)",border:isToday?"1px solid rgba(6,182,212,.4)":hasMat?`1px solid ${maturities[d][0].color}40`:"1px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:hasMat?"pointer":"default"}}
              title={hasMat?maturities[d].map(m=>`${m.name}: ${$(m.amount)}`).join("\n"):""}>
              {d&&<span style={{fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:isToday?700:400,color:isToday?"#06b6d4":hasMat?maturities[d][0].color:"#475569"}}>{d}</span>}
              {hasMat&&<div style={{width:4,height:4,borderRadius:"50%",background:maturities[d][0].color,marginTop:1}}/>}
            </div>
          );
        })}
      </div>
      {Object.keys(maturities).length===0&&(
        <div style={{textAlign:"center",fontSize:11,color:"#334155",fontFamily:"'DM Mono',monospace",padding:"8px 0"}}>No maturities this month</div>
      )}
      {Object.keys(maturities).length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:5,borderTop:"1px solid rgba(255,255,255,.05)",paddingTop:10,marginTop:6}}>
          {Object.entries(maturities).sort((a,b)=>a[0]-b[0]).map(([day,plans])=>(
            <div key={day} style={{display:"flex",justifyContent:"space-between",fontSize:11,fontFamily:"'DM Mono',monospace",alignItems:"center"}}>
              <span style={{color:"#475569"}}>Day {day} — {plans.map(p=>p.name).join(", ")}</span>
              <span style={{color:"#10b981",fontWeight:600}}>{$(plans.reduce((s,p)=>s+p.amount,0))}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

  const hasDeposit  = transactions.some(t=>t.type==="deposit");

  const steps = [

/* ═══ TAB: ACCOUNT SETTINGS ═══ */
function TabAccount({ user, setUser, showToast, isDemo }) {
  const [curPass,  setCurPass]  = useState("");
  const [newPass,  setNewPass]  = useState("");
  const [confPass, setConfPass] = useState("");
  const [loading,  setLoad]     = useState(false);
  const [err,      setErr]      = useState("");
  const [success,  setSuccess]  = useState("");
  const [showCur,  setShowCur]  = useState(false);
  const [showNew,  setShowNew]  = useState(false);

  const changePassword = async () => {
    setErr(""); setSuccess("");
    if(isDemo){ showToast("Demo mode — password change simulated ✓","ok"); return; }
    if(!curPass)                   { setErr("Enter your current password"); return; }
    if(!newPass||newPass.length<6) { setErr("New password must be at least 6 characters"); return; }
    if(newPass!==confPass)         { setErr("New passwords do not match"); return; }
    if(curPass===newPass)          { setErr("New password must be different from current password"); return; }
    setLoad(true);
    const users = await DB.get("users")||{};
    const u = users[user.email];
    if(!u||u.password!==curPass)   { setErr("Current password is incorrect"); setLoad(false); return; }
    const updated = {...u, password:newPass};
    users[user.email]=updated; await DB.set("users",users); setUser(updated);
    setCurPass(""); setNewPass(""); setConfPass("");
    setSuccess("Password changed successfully ✓"); setLoad(false);
  };

  const is = {width:"100%",padding:"11px 13px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#dde6f0",fontSize:14,outline:"none",fontFamily:"'DM Mono',monospace",boxSizing:"border-box"};

  return (
    <div style={{maxWidth:480}}>
      {/* Profile card */}
      <div style={{background:"linear-gradient(135deg,rgba(6,182,212,.07),rgba(139,92,246,.05))",border:"1px solid rgba(6,182,212,.15)",borderRadius:14,padding:"22px 24px",marginBottom:20,display:"flex",alignItems:"center",gap:16}}>
        <div style={{width:56,height:56,background:"linear-gradient(135deg,#06b6d4,#3b82f6)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:24,color:"#fff",flexShrink:0}}>{user.name[0].toUpperCase()}</div>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:18,color:"#dde6f0",marginBottom:3}}>{user.name}</div>
          <div style={{fontSize:12,color:"#475569",fontFamily:"'DM Mono',monospace"}}>{user.email}</div>
          <div style={{fontSize:10,color:"#334155",fontFamily:"'DM Mono',monospace",marginTop:3}}>Member since {fmtDate(user.createdAt)}</div>
        </div>
      </div>

      {/* Change password */}
      <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(255,255,255,.06)",borderRadius:12,padding:22}}>
        <ST>Change Password</ST>
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div>
            <label style={{fontSize:9,color:"#475569",letterSpacing:2,display:"block",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>CURRENT PASSWORD</label>
            <div style={{display:"flex",gap:8}}>
              <input type={showCur?"text":"password"} value={curPass} onChange={e=>setCurPass(e.target.value)} placeholder="Your current password" style={{...is,flex:1}}/>
              <button onClick={()=>setShowCur(v=>!v)} style={{padding:"0 13px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#475569",cursor:"pointer",fontSize:13}}>{showCur?"🙈":"👁"}</button>
            </div>
          </div>
          <div>
            <label style={{fontSize:9,color:"#475569",letterSpacing:2,display:"block",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>NEW PASSWORD</label>
            <div style={{display:"flex",gap:8}}>
              <input type={showNew?"text":"password"} value={newPass} onChange={e=>setNewPass(e.target.value)} placeholder="Min 6 characters" style={{...is,flex:1}}/>
              <button onClick={()=>setShowNew(v=>!v)} style={{padding:"0 13px",background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#475569",cursor:"pointer",fontSize:13}}>{showNew?"🙈":"👁"}</button>
            </div>
          </div>
          <div>
            <label style={{fontSize:9,color:"#475569",letterSpacing:2,display:"block",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>CONFIRM NEW PASSWORD</label>
            <input type="password" value={confPass} onChange={e=>setConfPass(e.target.value)} placeholder="Repeat new password" style={is}/>
            {confPass.length>0&&<div style={{marginTop:4,fontSize:10,fontFamily:"'DM Mono',monospace",color:confPass===newPass?"#10b981":"#ef4444"}}>{confPass===newPass?"✓ Passwords match":"✗ Passwords don't match"}</div>}
          </div>
          {err&&<div style={{padding:"9px 13px",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.28)",borderRadius:8,color:"#f87171",fontSize:12,fontFamily:"'DM Mono',monospace"}}>{err}</div>}

        </div>
      </div>

/* ═══ TAB: HISTORY + CSV EXPORT ═══ */
function TabHistory({ transactions }) {
  const TC={deposit:"#10b981",withdrawal:"#f59e0b",return:"#06b6d4",referral:"#8b5cf6",compound:"#a78bfa",loyalty:"#fbbf24",rank_bonus:"#f59e0b",binary_in:"#fbbf24",binary_out:"#10b981",binary_interest:"#10b981"};
  const TI={deposit:"↓",withdrawal:"↑",return:"◎",referral:"★",compound:"📈",loyalty:"⭐",rank_bonus:"🏆",binary_in:"🔒",binary_out:"🔓",binary_interest:"💰"};

  const exportCSV = () => {
    const rows = [["Date","Type","Description","Amount (USD)","Currency","Status"]];
    [...transactions].reverse().forEach(tx=>{
      rows.push([fmtDate(tx.date), tx.type, tx.desc, tx.amount.toFixed(2), tx.coin||"USD", tx.status]);
    });
    const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href=url; a.download=`hashvault-history-${new Date().toISOString().slice(0,10)}.csv`; a.click();
    URL.revokeObjectURL(url);
  };

  if(!transactions.length) return <Empty icon="≡" text="No transactions yet"/>;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:10}}>

              ⚠ <strong>Important:</strong> Your binary password cannot be recovered if forgotten. Store it safely. If you lose it, you must contact support and the admin can reset it — but only the admin can do so, and your balance remains safe either way.
            </div>
          </div>
        )}
      </div>

      {/* Navigation buttons */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <Btn variant="outline" onClick={()=>setStep(s=>Math.max(0,s-1))} disabled={step===0} style={{padding:"10px 22px"}}>← Previous</Btn>
        <div style={{display:"flex",gap:6}}>
          {STEPS.map((_,i)=>(
            <div key={i} onClick={()=>setStep(i)} style={{width:7,height:7,borderRadius:"50%",background:i===step?"#06b6d4":"rgba(255,255,255,.12)",cursor:"pointer",transition:"all .2s"}}/>
          ))}
        </div>
        {step<STEPS.length-1
          ?<Btn variant="primary" onClick={()=>setStep(s=>s+1)} style={{padding:"10px 22px"}}>Next →</Btn>
          :<Btn variant="primary" onClick={()=>setTab("binary")} style={{padding:"10px 22px",background:"#fbbf24",color:"#000"}}>Set Up Binary Account →</Btn>
        }
      </div>
    </div>
  );
}

/* ═══ TAB: HELP & SUPPORT ═══ */
function TabHelp({ user, showToast, isDemo }) {
  const [openFaq, setOpenFaq] = useState(null);
  const [subject, setSubject] = useState("");
  const [message, setMessage] = useState("");
  const [sending, setSending] = useState(false);

  const FAQS = [
    { q:"How do I start investing?", a:"Go to the Invest tab, choose a plan that suits your budget (Starter from $100, Silver from $1,000, Gold from $5,000, or Platinum from $20,000), select your investment duration, enter your amount, and proceed to payment. You'll be shown a wallet address to send your crypto to." },
    { q:"When do I receive my returns?", a:"Your returns are credited to your account balance when the investment period ends. For example, a 30-day plan starts paying out after 30 days from your deposit date. You can see the countdown on the My Plans tab." },
    { q:"What cryptocurrencies can I use?", a:"We accept USDT (TRC-20 / ERC-20), Ethereum (ETH), and Solana (SOL). You can select your preferred currency at checkout. The exact amount in crypto is shown based on the live market price." },
    { q:"How do withdrawals work?", a:"Go to the Withdraw tab, select your currency, enter the amount and your personal wallet address, then submit. All withdrawals are reviewed and processed within 3 business days. You will see the status update in your Transaction History." },
    { q:"Why is my withdrawal showing as 'processing'?", a:"This means your request has been received and is under review. Processing takes up to 3 business days. If it has been longer than 3 business days, please send a support message using the form below." },
    { q:"How does the referral program work?", a:"Each account has a unique referral code found in the Referrals tab. Share it with friends. When 3 of your referred friends make a successful deposit, you automatically receive 10% of each of their deposit amounts added to your balance." },
    { q:"Is my investment safe?", a:"All investments carry risk. HashVault operates professional mining infrastructure and aims to provide consistent returns, but past performance does not guarantee future results. Only invest what you can afford to commit for the duration of your chosen plan." },
    { q:"Can I invest multiple times?", a:"Yes, you can have multiple active investment plans simultaneously across different plan tiers and durations. Each investment runs independently with its own countdown and return." },
    { q:"How do I reset my password?", a:"On the login screen, click 'Forgot password?' and follow the 3-step verification: enter your email, confirm your full name, then set a new password. This works entirely on-device with no email required." },
    { q:"What if I sent the wrong amount?", a:"Please contact support immediately using the form below, including your transaction details. Our team will review your deposit and respond within 24 hours." },
    { q:"What is the Binary Account?", a:"The Binary Account is a personal vault inside your HashVault account. You can move any portion of your balance into it and protect it with your own password. Funds locked in binary cannot be withdrawn normally — you must enter your binary password to release them back to your main balance. It is designed for saving or protecting earnings with an extra layer of security." },
    { q:"I forgot my Binary Account password. What do I do?", a:"Contact our support team using the form below. An admin can reset your binary account password — your balance will not be affected. You will then be asked to set a new password the next time you open the Binary Account tab." },
  ];

  const sendMessage = async () => {
    if(!subject.trim()||!message.trim()){ showToast("Please fill in both fields","error"); return; }
    if(isDemo){ showToast("Demo mode — message not sent","error"); return; }
    setSending(true);
    await notifyAdmin({
      subject: `💬 Support Request — ${subject}`,
      user_name: user.name, user_email: user.email, user_id: user.id,
      support_subject: subject, support_message: message,
      req_date: new Date().toLocaleString(),
    });
    setTimeout(()=>{
      setSending(false); setSubject(""); setMessage("");
      showToast("Message sent — we'll respond within 24 hours ✓","ok");
    },800);
  };

  return (
    <div style={{maxWidth:640}}>
      {/* About Us quick link */}
      <div style={{background:"linear-gradient(135deg,rgba(6,182,212,.07),rgba(139,92,246,.05))",border:"1px solid rgba(6,182,212,.18)",borderRadius:14,padding:"18px 22px",marginBottom:24,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:16,color:"#dde6f0",marginBottom:4}}>About HashVault</div>
          <div style={{fontSize:11,color:"#475569",fontFamily:"'DM Mono',monospace"}}>Founded 2020 · Our story, team, infrastructure &amp; values</div>
        </div>
        <a href="#" onClick={e=>{e.preventDefault(); window.dispatchEvent(new CustomEvent("hashvault-about"));}} style={{padding:"9px 20px",background:"rgba(6,182,212,.12)",border:"1px solid rgba(6,182,212,.3)",borderRadius:8,color:"#06b6d4",fontSize:12,fontFamily:"'DM Mono',monospace",letterSpacing:1,textDecoration:"none",cursor:"pointer",fontWeight:600}}>
          Read Our Story →
        </a>
      </div>
      <div style={{marginBottom:36}}>
        <ST>Frequently Asked Questions</ST>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {FAQS.map((f,i)=>(
            <div key={i} style={{background:"rgba(255,255,255,.02)",border:`1px solid ${openFaq===i?"rgba(6,182,212,.25)":"rgba(255,255,255,.06)"}`,borderRadius:10,overflow:"hidden",transition:"border .2s"}}>
              <button onClick={()=>setOpenFaq(openFaq===i?null:i)} style={{width:"100%",padding:"14px 18px",background:"none",border:"none",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",textAlign:"left",gap:12}}>
                <span style={{fontWeight:600,fontSize:13,color:"#dde6f0",fontFamily:"'Georgia',serif"}}>{f.q}</span>
                <span style={{color:"#06b6d4",fontSize:18,flexShrink:0,transition:"transform .2s",transform:openFaq===i?"rotate(45deg)":"rotate(0deg)"}}>+</span>
              </button>
              {openFaq===i&&(
                <div style={{padding:"0 18px 16px",fontSize:13,color:"#94a3b8",lineHeight:1.75,fontFamily:"'DM Mono',monospace",borderTop:"1px solid rgba(255,255,255,.05)"}}><br/>{f.a}</div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Contact support */}
      <div style={{background:"rgba(255,255,255,.015)",border:"1px solid rgba(6,182,212,.12)",borderRadius:14,padding:"24px 26px"}}>
        <ST>Contact Support</ST>
        <p style={{fontSize:12,color:"#475569",fontFamily:"'DM Mono',monospace",margin:"0 0 20px",lineHeight:1.7}}>
          Can't find the answer you need? Send us a message and we'll respond within 24 hours.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:13}}>
          <div>
            <label style={{fontSize:9,color:"#475569",letterSpacing:2,display:"block",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>YOUR ACCOUNT</label>
            <div style={{padding:"10px 13px",background:"rgba(6,182,212,.05)",border:"1px solid rgba(6,182,212,.1)",borderRadius:8,fontSize:12,color:"#06b6d4",fontFamily:"'DM Mono',monospace"}}>{user.email}</div>
          </div>
          <Field label="SUBJECT" value={subject} onChange={setSubject} placeholder="e.g. Withdrawal not processed"/>
          <div>
            <label style={{fontSize:9,color:"#475569",letterSpacing:2,display:"block",marginBottom:6,fontFamily:"'DM Mono',monospace"}}>MESSAGE</label>
            <textarea value={message} onChange={e=>setMessage(e.target.value)} placeholder="Describe your issue in detail…" rows={5}
              style={{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#dde6f0",fontSize:13,fontFamily:"'DM Mono',monospace",outline:"none",resize:"vertical",boxSizing:"border-box",lineHeight:1.6}}
            />
          </div>
        </div>
        <Btn variant="primary" onClick={sendMessage} disabled={sending} style={{marginTop:16,padding:"12px 28px",letterSpacing:1}}>
          {sending?"SENDING…":"SEND MESSAGE"}
        </Btn>
        <p style={{fontSize:10,color:"#334155",fontFamily:"'DM Mono',monospace",marginTop:12,marginBottom:0}}>
          Response time: within 24 hours · Support hours: Mon–Sat
        </p>
      </div>
    </div>
  );
}

/* ═══ SHARED COMPONENTS ═══ */
function Logo() {
  return (
    <div style={{display:"flex",alignItems:"center",gap:9}}>
      <div style={{width:27,height:27,background:"linear-gradient(135deg,#06b6d4,#3b82f6)",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>⛏</div>
      <span style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:17,color:"#dde6f0"}}>HASH<span style={{color:"#06b6d4"}}>VAULT</span></span>
    </div>
  );
}
function Field({ label, value, onChange, type="text", placeholder }) {
  const [f,setF]=useState(false);
  return (
    <div>
      {label&&<label style={{display:"block",fontSize:9,color:"#475569",letterSpacing:2,marginBottom:6,fontFamily:"'DM Mono',monospace"}}>{label}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} onFocus={()=>setF(true)} onBlur={()=>setF(false)} style={{width:"100%",padding:"11px 13px",background:"rgba(255,255,255,.03)",border:`1px solid ${f?"rgba(6,182,212,.45)":"rgba(255,255,255,.1)"}`,borderRadius:8,color:"#dde6f0",fontSize:14,boxSizing:"border-box",outline:"none",fontFamily:"'DM Mono',monospace",transition:"border-color .15s"}}/>
    </div>
  );
}
function Btn({ variant="primary", children, onClick, disabled, style={} }) {
  const V={ primary:{background:"#06b6d4",color:"#fff",border:"none"}, outline:{background:"transparent",border:"1px solid rgba(6,182,212,.38)",color:"#06b6d4"}, ghost:{background:"transparent",border:"none",color:"#64748b"} };
  return <button className="lbtn" onClick={disabled?undefined:onClick} style={{borderRadius:8,cursor:disabled?"not-allowed":"pointer",fontWeight:600,fontFamily:"'DM Mono',monospace",fontSize:12,padding:"9px 17px",transition:"all .15s",letterSpacing:.5,opacity:disabled?.55:1,...V[variant]||{},...style}}>{children}</button>;
}
function ST({ children, style={} }) {
  return <h3 style={{margin:"0 0 13px",fontSize:9,color:"#475569",letterSpacing:3,fontFamily:"'DM Mono',monospace",textTransform:"uppercase",...style}}>{children}</h3>;
}
function Overlay({ children }) {
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>{children}</div>;
}
function Empty({ icon, text }) {
  return <div style={{textAlign:"center",padding:"56px 24px",color:"#334155"}}><div style={{fontSize:38,marginBottom:12}}>{icon}</div><p style={{fontFamily:"'DM Mono',monospace",fontSize:12}}>{text}</p></div>;
}

(function(){
  var cont=document.getElementById('root');
  ReactDOM.createRoot(cont).render(React.createElement(App));
})();
</script>
